<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Dashboard — حسن و نسرين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=Scheherazade+New:wght@400&display=swap" rel="stylesheet" />

    <style>
        /* ════════════════════════════════════════
           TOKENS — Burgundy · Gold · Ivory
        ════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --burg-deep:   #3a0d18;
          --burg:        #5c1a2a;
          --burg-mid:    #7a2438;
          --gold:        #c9a84c;
          --gold-light:  #e2c97e;
          --gold-dim:    rgba(201,168,76,.3);
          --ivory:       #f5ead8;
          --cream:       #faf4ec;
          --text-dark:   #2a0e16;
          --text-mid:    #6b3344;
          --text-muted:  #9e7060;
          --border-gold: rgba(201,168,76,.22);
          --border-card: rgba(201,168,76,.18);
          --shadow:      0 4px 24px rgba(58,13,24,.08);
          --shadow-lg:   0 16px 48px rgba(58,13,24,.16);
          --radius:      14px;
          --ease:        cubic-bezier(.4,0,.2,1);
        }

        html { scroll-behavior: smooth; }

        body {
          min-height: 100vh;
          background: var(--cream);
          font-family: 'Jost', sans-serif;
          font-weight: 300;
          color: var(--text-dark);
        }

        /* Subtle warm background glow */
        body::before {
          content: '';
          position: fixed; inset: 0;
          background:
            radial-gradient(ellipse 70% 50% at 0%   0%,   rgba(92,26,42,.07)   0%, transparent 55%),
            radial-gradient(ellipse 60% 40% at 100% 100%,  rgba(201,168,76,.06)  0%, transparent 50%);
          pointer-events: none; z-index: 0;
        }

        /* Diagonal gold texture */
        body::after {
          content: '';
          position: fixed; inset: 0;
          background-image: repeating-linear-gradient(
            135deg, transparent, transparent 80px,
            rgba(201,168,76,.018) 80px, rgba(201,168,76,.018) 81px
          );
          pointer-events: none; z-index: 0;
        }

        /* ════════════════════════════════
           PASSWORD GATE
        ════════════════════════════════ */
        #gate {
          position: fixed; inset: 0; z-index: 9999;
          background: var(--burg-deep);
          display: flex; align-items: center; justify-content: center;
          padding: 24px;
        }

        /* Same rich vignette as index page */
        #gate::before {
          content: '';
          position: fixed; inset: 0;
          background:
            radial-gradient(ellipse 90% 60% at 50% 0%,   rgba(122,36,56,.6)  0%, transparent 65%),
            radial-gradient(ellipse 70% 50% at 100% 100%, rgba(92,26,42,.45)  0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 0%   80%,  rgba(201,168,76,.05) 0%, transparent 50%);
          pointer-events: none;
        }

        #gate::after {
          content: '';
          position: fixed; inset: 0;
          background-image: repeating-linear-gradient(
            135deg, transparent, transparent 70px,
            rgba(201,168,76,.022) 70px, rgba(201,168,76,.022) 71px
          );
          pointer-events: none;
        }

        .gate-card {
          position: relative; z-index: 1;
          background: var(--cream);
          border-radius: 20px;
          box-shadow: 0 40px 100px rgba(58,13,24,.5);
          border: 1px solid var(--border-gold);
          width: 100%; max-width: 420px;
          overflow: hidden;
          animation: fadeUp .7s var(--ease) both;
        }

        /* Inner gold frame */
        .gate-card::before {
          content: '';
          position: absolute; inset: 7px;
          border: 1px solid var(--border-gold);
          border-radius: 14px;
          pointer-events: none; z-index: 10;
        }

        .gate-hero {
          background: linear-gradient(160deg, var(--burg-deep) 0%, var(--burg) 55%, var(--burg-mid) 100%);
          padding: 44px 36px 36px;
          text-align: center;
          position: relative; overflow: hidden;
        }

        /* Shimmer at bottom of gate hero */
        .gate-hero::after {
          content: '';
          position: absolute; bottom: -20px; left: 50%;
          transform: translateX(-50%);
          width: 140%; height: 50px;
          background: radial-gradient(ellipse at center, rgba(201,168,76,.15) 0%, transparent 70%);
          pointer-events: none;
        }

        /* Corner ornaments on gate */
        .gate-corner { position: absolute; width: 44px; height: 44px; opacity: .55; }
        .gate-corner svg { width: 100%; height: 100%; }
        .gate-corner--tl { top: 10px; left: 10px; }
        .gate-corner--tr { top: 10px; right: 10px; transform: scaleX(-1); }

        .gate-ornament {
          display: flex; align-items: center;
          margin: 0 auto 18px; max-width: 200px;
        }
        .gate-ornament .line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
        .gate-ornament .diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); margin: 0 10px; flex-shrink: 0; }

        .gate-icon { font-size: 28px; display: block; margin-bottom: 12px; }

        .gate-hero h2 {
          font-family: 'Cormorant Garamond', serif;
          font-weight: 300; font-size: 32px;
          color: var(--ivory); letter-spacing: .5px;
        }
        .gate-hero h2 em { font-style: italic; color: var(--gold-light); }

        .gate-hero p {
          font-size: 10px; letter-spacing: 4px;
          text-transform: uppercase;
          color: rgba(201,168,76,.55);
          margin-top: 8px; font-weight: 400;
        }

        .gate-body { padding: 32px 36px 36px; }

        .gate-label {
          display: block; font-size: 10px; letter-spacing: 3px;
          text-transform: uppercase; color: var(--text-mid);
          margin-bottom: 10px; font-weight: 500;
        }

        .gate-input-wrap { position: relative; margin-bottom: 8px; }

        #gatePassword {
          width: 100%; padding: 14px 48px 14px 18px;
          background: #fff;
          border: 1px solid rgba(92,26,42,.13);
          border-bottom: 2px solid rgba(92,26,42,.2);
          border-radius: 6px;
          font-family: 'Jost', sans-serif;
          font-size: 15px; font-weight: 300;
          color: var(--text-dark);
          outline: none; letter-spacing: 2px;
          transition: border-color .25s var(--ease), box-shadow .25s var(--ease);
        }
        #gatePassword:focus {
          border-color: rgba(92,26,42,.25);
          border-bottom-color: var(--gold);
          box-shadow: 0 4px 20px rgba(201,168,76,.1);
        }
        #gatePassword.error {
          border-bottom-color: #c0392b;
          animation: shake .35s var(--ease);
        }

        .toggle-pw {
          position: absolute; right: 14px; top: 50%;
          transform: translateY(-50%);
          background: none; border: none; cursor: pointer;
          color: var(--text-muted); font-size: 15px;
          padding: 4px; transition: color .2s;
        }
        .toggle-pw:hover { color: var(--burg); }

        .gate-error {
          font-size: 12px; color: #c0392b;
          min-height: 18px; text-align: center;
          opacity: 0; transition: opacity .2s;
          margin-bottom: 16px; margin-top: 6px;
        }
        .gate-error.visible { opacity: 1; }

        .btn-gate {
          width: 100%; padding: 16px;
          background: linear-gradient(135deg, var(--burg-deep), var(--burg-mid));
          color: var(--gold-light);
          border: 1px solid var(--gold-dim);
          border-radius: 6px;
          font-family: 'Jost', sans-serif;
          font-size: 11px; font-weight: 500;
          letter-spacing: 5px; text-transform: uppercase;
          cursor: pointer; position: relative; overflow: hidden;
          box-shadow: 0 8px 28px rgba(58,13,24,.28);
          transition: transform .2s var(--ease), box-shadow .2s var(--ease);
        }
        .btn-gate::after {
          content: '';
          position: absolute; top: 0; left: -100%;
          width: 60%; height: 100%;
          background: linear-gradient(90deg, transparent, rgba(201,168,76,.2), transparent);
          transform: skewX(-20deg);
          transition: left .5s var(--ease);
        }
        .btn-gate:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(58,13,24,.38); }
        .btn-gate:hover::after { left: 160%; }

        /* ════════════════════════════════
           LAYOUT
        ════════════════════════════════ */
        .layout { position: relative; z-index: 1; display: none; grid-template-rows: auto 1fr; min-height: 100vh; }
        .layout.unlocked { display: grid; }

        /* ════════════════════════════════
           TOP BAR
        ════════════════════════════════ */
        .topbar {
          background: linear-gradient(135deg, var(--burg-deep) 0%, var(--burg) 55%, var(--burg-mid) 100%);
          padding: 0 44px; height: 72px;
          display: flex; align-items: center; justify-content: space-between;
          position: sticky; top: 0; z-index: 100;
          box-shadow: 0 4px 24px rgba(58,13,24,.3);
          border-bottom: 1px solid var(--gold-dim);
        }

        .topbar-brand { display: flex; align-items: center; gap: 16px; }

        .logo {
          width: 40px; height: 40px; border-radius: 50%;
          background: rgba(201,168,76,.15);
          border: 1px solid var(--gold-dim);
          display: flex; align-items: center; justify-content: center;
          font-size: 18px;
        }

        .topbar-brand h1 {
          font-family: 'Cormorant Garamond', serif;
          font-weight: 300; font-size: 22px;
          color: var(--ivory); letter-spacing: .5px;
        }
        .topbar-brand h1 em { font-style: italic; color: var(--gold-light); }

        .topbar-divider { display: flex; align-items: center; gap: 8px; opacity: .4; }
        .topbar-divider span { width: 30px; height: 1px; background: var(--gold); }
        .topbar-divider i { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); display: block; }

        .topbar-meta {
          font-size: 10px; letter-spacing: 4px;
          text-transform: uppercase;
          color: rgba(201,168,76,.55); font-weight: 400;
        }

        /* ════════════════════════════════
           MAIN CONTENT
        ════════════════════════════════ */
        .main { padding: 40px 44px 64px; max-width: 1120px; margin: 0 auto; width: 100%; }

        .section-label {
          font-size: 10px; letter-spacing: 4px;
          text-transform: uppercase;
          color: var(--text-muted); font-weight: 500; margin-bottom: 16px;
        }

        /* ════════════════════════════════
           STAT CARDS
        ════════════════════════════════ */
        .stats {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
          gap: 20px; margin-bottom: 44px;
        }

        .stat-card {
          background: #fff;
          border-radius: var(--radius);
          padding: 28px 30px;
          box-shadow: var(--shadow);
          border: 1px solid var(--border-card);
          position: relative; overflow: hidden;
          transition: transform .25s var(--ease), box-shadow .25s var(--ease);
          animation: fadeUp .5s var(--ease) both;
        }
        .stat-card:nth-child(2) { animation-delay: .08s; }
        .stat-card:nth-child(3) { animation-delay: .16s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

        /* Gold top accent bar */
        .stat-card::before {
          content: '';
          position: absolute; top: 0; left: 0; right: 0; height: 2px;
          background: linear-gradient(90deg, var(--burg), var(--gold), var(--burg));
        }

        /* Decorative corner dot */
        .stat-card::after {
          content: '';
          position: absolute; bottom: 14px; right: 18px;
          width: 6px; height: 6px;
          background: var(--gold-dim); border-radius: 50%;
        }

        .stat-label {
          font-size: 10px; letter-spacing: 3px;
          text-transform: uppercase;
          color: var(--text-muted); font-weight: 500; margin-bottom: 12px;
        }

        .stat-number {
          font-family: 'Cormorant Garamond', serif;
          font-size: 54px; font-weight: 300;
          color: var(--burg); line-height: 1;
          transition: opacity .3s;
        }
        .stat-card.loading .stat-number { opacity: .25; }

        /* ════════════════════════════════
           SEARCH BAR
        ════════════════════════════════ */
        .search-wrap { position: relative; margin-bottom: 30px; animation: fadeUp .5s var(--ease) .2s both; }

        .search-icon {
          position: absolute; left: 20px; top: 50%;
          transform: translateY(-50%);
          color: var(--text-muted); font-size: 15px; pointer-events: none;
        }

        #search {
          width: 100%;
          padding: 15px 20px 15px 50px;
          background: #fff;
          border: 1px solid var(--border-card);
          border-radius: 50px;
          font-family: 'Jost', sans-serif;
          font-size: 14px; font-weight: 300;
          color: var(--text-dark);
          outline: none;
          box-shadow: var(--shadow);
          transition: border-color .25s var(--ease), box-shadow .25s var(--ease);
        }
        #search:focus {
          border-color: var(--gold);
          box-shadow: 0 0 0 4px rgba(201,168,76,.1), var(--shadow);
        }
        #search::placeholder { color: var(--text-muted); }

        /* ════════════════════════════════
           LIST HEADER
        ════════════════════════════════ */
        .list-header {
          display: flex; align-items: center; justify-content: space-between;
          margin-bottom: 18px;
          animation: fadeUp .5s var(--ease) .28s both;
        }

        .filter-pills { display: flex; gap: 8px; }

        .pill {
          padding: 7px 18px; border-radius: 50px;
          font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
          cursor: pointer;
          border: 1px solid var(--border-card);
          background: transparent;
          color: var(--text-muted);
          font-family: 'Jost', sans-serif; font-weight: 500;
          transition: all .2s var(--ease);
        }
        .pill.active, .pill:hover {
          background: var(--burg);
          border-color: var(--burg);
          color: var(--gold-light);
        }

        /* Refresh button */
        .btn-refresh {
          display: flex; align-items: center; gap: 7px;
          padding: 8px 18px; border-radius: 50px;
          border: 1px solid var(--border-card);
          background: #fff; color: var(--burg-mid);
          font-family: 'Jost', sans-serif;
          font-size: 10px; font-weight: 500;
          letter-spacing: 2px; text-transform: uppercase;
          cursor: pointer;
          box-shadow: var(--shadow);
          transition: all .2s var(--ease);
        }
        .btn-refresh:hover { background: var(--burg); color: var(--gold-light); border-color: var(--burg); }
        .btn-refresh.spinning svg { animation: spin .8s linear infinite; }

        /* ════════════════════════════════
           GUEST CARDS
        ════════════════════════════════ */
        #guestList { display: grid; gap: 14px; }

        .guest {
          background: #fff;
          border-radius: var(--radius);
          padding: 22px 28px;
          box-shadow: var(--shadow);
          border: 1px solid var(--border-card);
          display: grid; grid-template-columns: 1fr auto; align-items: start; gap: 12px;
          transition: transform .25s var(--ease), box-shadow .25s var(--ease);
          animation: fadeUp .4s var(--ease) both;
          position: relative; overflow: hidden;
        }

        /* Left accent bar */
        .guest::before {
          content: '';
          position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
          background: linear-gradient(180deg, var(--burg), var(--gold));
        }

        .guest:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        .guest-info { display: flex; flex-direction: column; gap: 7px; padding-left: 4px; }

        .guest-name {
          font-family: 'Cormorant Garamond', serif;
          font-size: 22px; font-weight: 400;
          color: var(--text-dark);
        }

        .guest-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

        .guest-detail { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

        .guest-notes { font-size: 13px; color: var(--text-muted); font-style: italic; line-height: 1.5; }

        /* Status badges */
        .badge {
          display: inline-flex; align-items: center; gap: 5px;
          padding: 5px 13px; border-radius: 50px;
          font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
          font-weight: 500; white-space: nowrap;
        }
        .badge--attending {
          background: rgba(92,26,42,.08);
          color: var(--burg);
          border: 1px solid rgba(92,26,42,.18);
        }
        .badge--attending::before { content: '●'; font-size: 6px; color: var(--gold); }
        .badge--declined {
          background: rgba(180,140,110,.1);
          color: var(--text-muted);
          border: 1px solid var(--border-card);
        }
        .badge--declined::before { content: '○'; font-size: 6px; color: var(--text-muted); }

        /* ════════════════════════════════
           SKELETON LOADERS
        ════════════════════════════════ */
        .skeleton {
          background: linear-gradient(90deg, var(--ivory) 25%, #fff 50%, var(--ivory) 75%);
          background-size: 200% 100%;
          animation: shimmer 1.4s infinite;
          border-radius: 6px;
        }
        .skeleton-card {
          background: #fff; border-radius: var(--radius);
          padding: 22px 28px; box-shadow: var(--shadow);
          border: 1px solid var(--border-card);
          display: flex; flex-direction: column; gap: 10px;
        }
        .skeleton-name { height: 22px; width: 50%; }
        .skeleton-tag  { height: 26px; width: 110px; border-radius: 50px; }
        .skeleton-line { height: 14px; }

        /* ════════════════════════════════
           EMPTY STATE
        ════════════════════════════════ */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
        .empty-icon  { font-size: 36px; margin-bottom: 12px; }
        .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; }

        /* ════════════════════════════════
           ANIMATIONS
        ════════════════════════════════ */
        @keyframes fadeUp  { from{opacity:0;transform:translateY(18px);}  to{opacity:1;transform:translateY(0);} }
        @keyframes fadeIn  { from{opacity:0;} to{opacity:1;} }
        @keyframes spin    { to{transform:rotate(360deg);} }
        @keyframes shimmer { to{background-position:-200% 0;} }
        @keyframes shake   { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }

        /* ════════════════════════════════
           RESPONSIVE
        ════════════════════════════════ */
        @media (max-width: 680px) {
          .topbar { padding: 0 20px; }
          .topbar-meta, .topbar-divider { display: none; }
          .main { padding: 24px 20px 48px; }
          .guest { grid-template-columns: 1fr; }
          .filter-pills { display: none; }
          .gate-body { padding: 28px 24px 32px; }
          .gate-hero { padding: 36px 24px 30px; }
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════
     PASSWORD GATE
════════════════════════════════ -->
<div id="gate">
    <div class="gate-card">

        <div class="gate-hero">
            <!-- Corner ornaments -->
            <div class="gate-corner gate-corner--tl"><svg viewBox="0 0 44 44" fill="none"><path d="M3 3 L3 20 M3 3 L20 3" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/><path d="M3 3 Q13 3 13 13" stroke="#c9a84c" stroke-width=".8" fill="none" opacity=".5"/><circle cx="3" cy="3" r="2" fill="#c9a84c"/></svg></div>
            <div class="gate-corner gate-corner--tr"><svg viewBox="0 0 44 44" fill="none"><path d="M3 3 L3 20 M3 3 L20 3" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/><path d="M3 3 Q13 3 13 13" stroke="#c9a84c" stroke-width=".8" fill="none" opacity=".5"/><circle cx="3" cy="3" r="2" fill="#c9a84c"/></svg></div>

            <div class="gate-ornament">
                <span class="line"></span><span class="diamond"></span><span class="line"></span>
            </div>

            <span class="gate-icon">🔐</span>
            <h2>Private <em>Access</em></h2>
            <p>Bride &amp; Admin Only</p>
        </div>

        <div class="gate-body">
            <label class="gate-label" for="gatePassword">Password</label>
            <div class="gate-input-wrap">
                <input type="password" id="gatePassword" placeholder="Enter your password" autocomplete="current-password" />
                <button class="toggle-pw" id="togglePw" type="button" title="Show/hide password">👁</button>
            </div>
            <p class="gate-error" id="gateError">Incorrect password. Please try again.</p>
            <button class="btn-gate" id="gateSubmit">Enter Dashboard</button>
        </div>

    </div>
</div>

<!-- ════════════════════════════════
     DASHBOARD
════════════════════════════════ -->
<div class="layout">

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-brand">
            <div class="logo">💍</div>
            <h1>Wedding <em>Dashboard</em></h1>
        </div>
        <div class="topbar-divider">
            <span></span><i></i><span></span>
        </div>
        <span class="topbar-meta">Guest Management</span>
    </header>

    <!-- Main -->
    <main class="main">

        <!-- Stats -->
        <p class="section-label">Overview</p>
        <div class="stats">
            <div class="stat-card" id="card-total">
                <div class="stat-label">Total Guests</div>
                <div class="stat-number" id="totalGuests">—</div>
            </div>
            <div class="stat-card" id="card-attending">
                <div class="stat-label">Attending</div>
                <div class="stat-number" id="attendingCount">—</div>
            </div>
            <div class="stat-card" id="card-declined">
                <div class="stat-label">Declined</div>
                <div class="stat-number" id="declinedCount">—</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search by name, status, notes…" autocomplete="off" />
        </div>

        <!-- List header -->
        <div class="list-header">
            <p class="section-label" style="margin:0">Guest List</p>
            <div style="display:flex;align-items:center;gap:12px">
                <div class="filter-pills">
                    <button class="pill active" data-filter="all">All</button>
                    <button class="pill" data-filter="Will Attend">Attending</button>
                    <button class="pill" data-filter="Cannot Attend">Declined</button>
                </div>
                <button class="btn-refresh" id="refreshBtn" title="Refresh">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- Guest list -->
        <div id="guestList" aria-live="polite"></div>
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🔎</div>
            <p>No guests match your search</p>
        </div>

    </main>
</div>

<script>
    /* ════════════════════════════════════════
       PASSWORD GATE — change ADMIN_PASSWORD only
    ════════════════════════════════════════ */
    const ADMIN_PASSWORD = "roses2025"; // ← change this
    const SESSION_KEY    = "wedding_admin_auth";

    function unlock() {
      document.getElementById("gate").style.display = "none";
      document.querySelector(".layout").classList.add("unlocked");
      loadGuests();
    }

    if (sessionStorage.getItem(SESSION_KEY) === ADMIN_PASSWORD) { unlock(); }

    document.getElementById("gateSubmit").addEventListener("click", checkPassword);
    document.getElementById("gatePassword").addEventListener("keydown", function(e) { if(e.key==="Enter") checkPassword(); });

    function checkPassword() {
      const input = document.getElementById("gatePassword");
      const error = document.getElementById("gateError");
      if (input.value === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, ADMIN_PASSWORD);
        unlock();
      } else {
        input.classList.add("error");
        error.classList.add("visible");
        input.value = "";
        setTimeout(() => input.classList.remove("error"), 400);
      }
    }

    document.getElementById("togglePw").addEventListener("click", function() {
      const input = document.getElementById("gatePassword");
      input.type = input.type === "password" ? "text" : "password";
      this.textContent = input.type === "password" ? "👁" : "🙈";
    });

    /* ── API — DO NOT modify API_URL ── */
    const API_URL = "https://script.google.com/macros/s/AKfycbzc06dJ2Rj2xwpKK8iphPAJCGXojUCMtsklfEFR2QoMpABY3u-SfWle2vcX0lHlw-be/exec";

    let allGuests    = [];
    let activeFilter = "all";

    function showSkeletons(n = 5) {
      document.getElementById("guestList").innerHTML = Array.from({length:n}, () => `
        <div class="skeleton-card">
          <div class="skeleton skeleton-name"></div>
          <div class="skeleton skeleton-tag"></div>
          <div class="skeleton skeleton-line" style="width:38%"></div>
        </div>`).join("");
    }

    function renderGuests(guests) {
      const list  = document.getElementById("guestList");
      const empty = document.getElementById("emptyState");
      if (!guests.length) { list.innerHTML = ""; empty.style.display = "block"; return; }
      empty.style.display = "none";
      list.innerHTML = guests.map((g, i) => {
        const isAttending = g.attendance === "Will Attend";
        const badgeClass  = isAttending ? "badge--attending" : "badge--declined";
        const notes       = g.notes ? `<p class="guest-notes">${g.notes}</p>` : "";
        return `
          <div class="guest" style="animation-delay:${i*.045}s">
            <div class="guest-info">
              <div class="guest-name">${g.name || "—"}</div>
              <div class="guest-meta">
                <span class="badge ${badgeClass}">${g.attendance || "—"}</span>
                ${g.guests ? `<span class="guest-detail">👥 ${g.guests} guest${g.guests!=1?'s':''}</span>` : ""}
              </div>
              ${notes}
            </div>
          </div>`;
      }).join("");
    }

    function updateStats(guests) {
      const total     = guests.length;
      const attending = guests.filter(g => g.attendance === "Will Attend").length;
      animateNumber("totalGuests",    total);
      animateNumber("attendingCount", attending);
      animateNumber("declinedCount",  total - attending);
    }

    function animateNumber(id, target) {
      const el = document.getElementById(id);
      const start = parseInt(el.textContent) || 0;
      const diff  = target - start;
      const dur   = 500; let t0;
      function step(ts) {
        if (!t0) t0 = ts;
        const p = Math.min((ts-t0)/dur, 1);
        el.textContent = Math.round(start + diff * p);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function applyFilters() {
      const query = document.getElementById("search").value.toLowerCase().trim();
      let filtered = allGuests;
      if (activeFilter !== "all") filtered = filtered.filter(g => g.attendance === activeFilter);
      if (query) filtered = filtered.filter(g => [g.name,g.attendance,g.notes,g.guests].join(" ").toLowerCase().includes(query));
      renderGuests(filtered);
    }

    async function loadGuests() {
      const refreshBtn = document.getElementById("refreshBtn");
      refreshBtn.classList.add("spinning");
      showSkeletons();
      document.querySelectorAll(".stat-card").forEach(c => c.classList.add("loading"));
      try {
        const res  = await fetch(API_URL);
        const data = await res.json();
        allGuests  = data;
        updateStats(data);
        applyFilters();
      } catch(err) {
        document.getElementById("guestList").innerHTML =
          `<div class="empty-state" style="display:block"><div class="empty-icon">⚠️</div><p>Could not load guests. Try refreshing.</p></div>`;
      } finally {
        document.querySelectorAll(".stat-card").forEach(c => c.classList.remove("loading"));
        refreshBtn.classList.remove("spinning");
      }
    }

    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("refreshBtn").addEventListener("click", loadGuests);
    document.querySelectorAll(".pill").forEach(pill => {
      pill.addEventListener("click", function() {
        document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
        this.classList.add("active");
        activeFilter = this.dataset.filter;
        applyFilters();
      });
    });

    /* ── Init: loadGuests() is called by unlock() after password auth ── */
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding RSVP — حسن و نسرين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet" />

    <style>
        /* ════════════════════════════════════════
           DESIGN TOKENS — Neutral Rose Palette
           Cream #EFEBE5 · Beige #E2DED7 · Rose #CC838A · Brown #83675B
        ════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --cream:       #EFEBE5;
          --cream-light: #f5f3f0;
          --beige:       #E2DED7;
          --beige-light: #E8E4DC;
          --taupe:       #BCB7B4;
          --taupe-dark:  #95908D;
          --rose:        #CC838A;
          --rose-light:  #d9959f;
          --brown:       #83675B;
          --brown-dark:  #6d5449;
          --text-dark:   #3d312a;
          --text-mid:    #6d5449;
          --text-muted:  #95908D;
          --border-rose: rgba(204,131,138,.25);
          --shadow-lg:   0 40px 100px rgba(131,103,91,.15);
          --shadow-xl:   0 60px 140px rgba(131,103,91,.2);
          --radius:      4px;
          --radius-lg:   18px;
          --ease:        cubic-bezier(.4,0,.2,1);
          --ease-smooth: cubic-bezier(.25,.46,.45,.94);
        }

        html { scroll-behavior: smooth; }

        body {
          min-height: 100vh;
          background: var(--cream);
          font-family: 'Jost', sans-serif;
          font-weight: 300;
          color: var(--text-dark);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 40px 20px;
          position: relative;
          overflow-x: hidden;
        }

        /* Premium vignette layers */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background:
            radial-gradient(ellipse 100% 70% at 50% -10%,  rgba(204,131,138,.12)  0%, transparent 55%),
            radial-gradient(ellipse 80% 60% at 100% 100%, rgba(131,103,91,.08)  0%, transparent 65%),
            radial-gradient(ellipse 60% 50% at 0% 70%,  rgba(204,131,138,.05)  0%, transparent 55%);
          pointer-events: none;
          z-index: 0;
        }

        /* Diagonal luxury texture */
        body::after {
          content: '';
          position: fixed;
          inset: 0;
          background-image: repeating-linear-gradient(
            135deg,
            transparent, transparent 70px,
            rgba(131,103,91,.03) 70px,
            rgba(131,103,91,.03) 71px
          );
          pointer-events: none;
          z-index: 0;
        }

        /* ── Premium floating particles ── */
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle {
          position: absolute;
          border-radius: 50%;
          background: radial-gradient(circle, var(--rose), rgba(204,131,138,.3));
          opacity: 0;
          box-shadow: 0 0 20px rgba(204,131,138,.3);
          animation: floatUp linear infinite;
        }
        @keyframes floatUp {
          0%   { opacity: 0; transform: translateY(0) translateX(0) scale(0); }
          10%  { opacity: .5; }
          50%  { opacity: .3; }
          90%  { opacity: .1; }
          100% { opacity: 0; transform: translateY(-120vh) translateX(100px) scale(1.8); }
        }

        /* ══════════════════════════════════════
           MAIN CONTAINER
        ══════════════════════════════════════ */
        .container {
          position: relative;
          z-index: 2;
          width: 100%;
          max-width: 600px;
          animation: revealContainer .9s var(--ease) both;
        }

        @keyframes revealContainer {
          from { opacity: 0; transform: translateY(40px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* ══════════════════════════════════════
           CINEMATIC HERO SECTION
        ══════════════════════════════════════ */
        .hero {
          position: relative;
          margin-bottom: 48px;
          animation: fadeDown .8s var(--ease) .1s both;
        }

        .hero-backdrop {
          position: relative;
          background: linear-gradient(145deg, var(--cream) 0%, var(--beige) 40%, var(--taupe) 100%);
          border-radius: var(--radius-lg);
          padding: 60px 40px;
          text-align: center;
          overflow: hidden;
          box-shadow: var(--shadow-xl);
          border: 1px solid var(--border-rose);
          backdrop-filter: blur(10px);
        }

        .hero-backdrop::before {
          content: '';
          position: absolute;
          inset: 0;
          background:
            radial-gradient(ellipse 80% 100% at 50% 0%, rgba(204,131,138,.1) 0%, transparent 70%),
            radial-gradient(ellipse 100% 80% at 50% 100%, rgba(131,103,91,.08) 0%, transparent 60%);
          pointer-events: none;
        }

        .hero-backdrop::after {
          content: '';
          position: absolute;
          inset: 7px;
          border: 1px solid var(--border-rose);
          border-radius: calc(var(--radius-lg) - 3px);
          pointer-events: none;
        }

        .hero-content { position: relative; z-index: 2; }

        .hero-basmala {
          font-family: 'Scheherazade New', serif;
          font-size: 20px;
          color: var(--rose);
          letter-spacing: 2px;
          margin-bottom: 24px;
          opacity: .95;
          animation: fadeDown .8s var(--ease) .2s both;
          text-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .hero-ornament {
          display: flex;
          align-items: center;
          justify-content: center;
          margin: 0 auto 28px;
          max-width: 280px;
          gap: 16px;
          animation: fadeDown .8s var(--ease) .3s both;
        }
        .hero-ornament .line {
          flex: 1;
          height: 2px;
          background: linear-gradient(90deg, transparent, var(--rose), var(--rose), transparent);
          box-shadow: 0 0 15px rgba(204,131,138,.25);
        }
        .hero-ornament .diamond {
          width: 8px; height: 8px;
          background: var(--rose);
          transform: rotate(45deg);
          box-shadow: 0 0 12px rgba(204,131,138,.4);
        }

        .hero-names {
          font-family: 'Cormorant Garamond', serif;
          font-size: 44px;
          font-weight: 300;
          color: var(--brown);
          letter-spacing: 3px;
          margin-bottom: 8px;
          animation: fadeDown .8s var(--ease) .35s both;
          text-shadow: 0 4px 16px rgba(0,0,0,.08);
        }

        .hero-names em {
          display: block;
          font-style: italic;
          font-size: 36px;
          color: var(--rose);
          margin-top: 6px;
        }

        .hero-date {
          font-size: 14px;
          letter-spacing: 3px;
          text-transform: uppercase;
          color: var(--rose);
          margin-top: 20px;
          animation: fadeDown .8s var(--ease) .4s both;
        }

        /* ══════════════════════════════════════
           COUNTDOWN TIMER
        ══════════════════════════════════════ */
        .countdown {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 12px;
          margin-top: 32px;
          animation: fadeDown .8s var(--ease) .45s both;
        }

        .countdown-item {
          background: rgba(204,131,138,.08);
          border: 1px solid var(--border-rose);
          border-radius: 12px;
          padding: 16px 12px;
          text-align: center;
          backdrop-filter: blur(10px);
          transition: all .3s var(--ease-smooth);
        }

        .countdown-item:hover {
          background: rgba(204,131,138,.12);
          border-color: var(--rose);
          box-shadow: 0 8px 24px rgba(204,131,138,.15);
          transform: translateY(-4px);
        }

        .countdown-number {
          font-size: 24px;
          font-weight: 600;
          color: var(--rose);
          display: block;
          font-family: 'Jost', sans-serif;
          line-height: 1;
          margin-bottom: 6px;
        }

        .countdown-label {
          font-size: 10px;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--taupe-dark);
          font-weight: 400;
        }

        /* ══════════════════════════════════════
           LUXURY CARD
        ══════════════════════════════════════ */
        .card {
          position: relative;
          background: var(--cream-light);
          width: 100%;
          border-radius: var(--radius-lg);
          box-shadow: var(--shadow-xl);
          overflow: hidden;
          animation: scaleReveal .9s var(--ease) .5s both;
          border: 1px solid var(--border-rose);
          backdrop-filter: blur(10px);
        }

        @keyframes scaleReveal {
          from { opacity: 0; transform: scale(.95) translateY(30px); }
          to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card::before {
          content: '';
          position: absolute;
          inset: 7px;
          border: 1px solid var(--border-rose);
          border-radius: calc(var(--radius-lg) - 3px);
          pointer-events: none;
          z-index: 10;
        }

        /* ══════════════════════════════════════
           CARD HEADER
        ══════════════════════════════════════ */
        .card-header {
          background: linear-gradient(170deg, var(--cream) 0%, var(--beige) 50%, var(--taupe) 100%);
          padding: 48px 40px 40px;
          text-align: center;
          position: relative;
          overflow: hidden;
          border-bottom: 2px solid var(--border-rose);
        }

        .card-header::after {
          content: '';
          position: absolute;
          bottom: -20px; left: 50%;
          transform: translateX(-50%);
          width: 140%; height: 50px;
          background: radial-gradient(ellipse at center, rgba(204,131,138,.12) 0%, transparent 70%);
          pointer-events: none;
        }

        .card-ornament {
          display: flex;
          align-items: center;
          margin: 0 auto 20px;
          max-width: 220px;
          gap: 14px;
          animation: fadeDown .8s var(--ease) .55s both;
        }
        .card-ornament .line {
          flex: 1;
          height: 1.5px;
          background: linear-gradient(90deg, transparent, var(--rose), transparent);
        }
        .card-ornament .diamond {
          width: 6px; height: 6px;
          background: var(--rose);
          transform: rotate(45deg);
        }

        .card-title {
          font-family: 'Cormorant Garamond', serif;
          font-size: 40px;
          font-weight: 300;
          color: var(--brown);
          letter-spacing: 2px;
          margin-bottom: 4px;
          animation: fadeDown .8s var(--ease) .6s both;
        }

        .card-subtitle {
          font-size: 12px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: var(--rose);
          font-weight: 400;
          animation: fadeDown .8s var(--ease) .65s both;
        }

        /* ══════════════════════════════════════
           CARD BODY
        ══════════════════════════════════════ */
        .card-body {
          padding: 44px 36px;
          position: relative;
          z-index: 1;
        }

        .card-label {
          display: block;
          font-size: 11px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: var(--text-mid);
          margin-bottom: 12px;
          font-weight: 500;
          animation: fadeDown .8s var(--ease) .7s both;
        }

        .form-group {
          margin-bottom: 24px;
          animation: fadeDown .8s var(--ease) calc(.7s + var(--delay, 0s)) both;
        }

        .form-group:nth-child(1) { --delay: 0s; }
        .form-group:nth-child(2) { --delay: .05s; }
        .form-group:nth-child(3) { --delay: .1s; }
        .form-group:nth-child(4) { --delay: .15s; }
        .form-group:nth-child(5) { --delay: .2s; }

        label {
          display: block;
          font-size: 12px;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--text-dark);
          margin-bottom: 8px;
          font-weight: 500;
          transition: color .25s var(--ease);
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
          width: 100%;
          padding: 13px 16px;
          background: #fff;
          border: 1.5px solid rgba(131,103,91,.12);
          border-radius: 8px;
          font-family: 'Jost', sans-serif;
          font-size: 14px;
          font-weight: 300;
          color: var(--text-dark);
          outline: none;
          transition: all .3s var(--ease-smooth);
          backdrop-filter: blur(5px);
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
          border-color: var(--rose);
          background: #ffffff;
          box-shadow: 0 0 0 3px rgba(204,131,138,.12), 0 8px 24px rgba(204,131,138,.1);
          transform: translateY(-2px);
        }

        textarea {
          resize: vertical;
          min-height: 85px;
          font-family: 'Jost', sans-serif;
        }

        .form-row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 16px;
        }

        .form-row .form-group { margin-bottom: 0; }

        @media (max-width: 600px) {
          .form-row { grid-template-columns: 1fr; }
        }

        /* ══════════════════════════════════════
           SUBMIT BUTTON
        ══════════════════════════════════════ */
        .btn-submit {
          width: 100%;
          padding: 15px 32px;
          background: linear-gradient(135deg, var(--rose) 0%, var(--rose-light) 100%);
          color: var(--cream-light);
          border: 2px solid var(--rose);
          border-radius: 10px;
          font-family: 'Jost', sans-serif;
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition: all .4s var(--ease-smooth);
          box-shadow: 0 8px 24px rgba(131,103,91,.2);
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 12px;
          margin-top: 8px;
          animation: fadeDown .8s var(--ease) .95s both;
        }

        .btn-submit::before {
          content: '';
          position: absolute;
          top: 0; left: -100%;
          width: 100%; height: 100%;
          background: linear-gradient(135deg, var(--rose-light) 0%, var(--brown) 100%);
          transition: left .4s var(--ease-smooth);
          z-index: -1;
        }

        .btn-submit:hover::before { left: 0; }

        .btn-submit:hover {
          transform: translateY(-2px);
          box-shadow: 0 12px 36px rgba(131,103,91,.25), 0 0 24px rgba(204,131,138,.2);
          border-color: var(--rose-light);
        }

        .btn-submit:active {
          transform: translateY(0);
        }

        .btn-submit.loading {
          pointer-events: none;
          opacity: .8;
        }

        .btn-text { opacity: 1; transition: opacity .3s var(--ease); }
        .btn-submit.loading .btn-text { opacity: 0; position: absolute; }

        .spinner {
          width: 16px;
          height: 16px;
          border: 2px solid rgba(255,255,255,.3);
          border-top-color: var(--cream-light);
          border-radius: 50%;
          animation: spin .6s linear infinite;
          opacity: 0;
          transition: opacity .3s var(--ease);
        }

        .btn-submit.loading .spinner { opacity: 1; }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        /* ══════════════════════════════════════
           SUCCESS MESSAGE
        ══════════════════════════════════════ */
        #msg {
          text-align: center;
          display: none;
          animation: fadeIn .6s var(--ease) both;
        }

        #msg.visible {
          display: block;
        }

        .msg-seal {
          font-size: 48px;
          display: block;
          margin-bottom: 20px;
          animation: bounce .6s var(--ease-smooth) both;
        }

        @keyframes bounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-12px); }
        }

        #msg h3 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 32px;
          color: var(--rose);
          margin-bottom: 12px;
          font-weight: 300;
        }

        #msg p {
          font-size: 14px;
          color: var(--text-mid);
          line-height: 1.6;
          margin-bottom: 20px;
        }

        .gold-rule {
          height: 2px;
          background: linear-gradient(90deg, transparent, var(--rose), transparent);
          margin-top: 20px;
        }

        /* ══════════════════════════════════════
           MUSIC PLAYER — PREMIUM STYLING
        ══════════════════════════════════════ */
        .music-player {
          position: fixed;
          bottom: 30px;
          right: 30px;
          z-index: 100;
        }

        .music-toggle {
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: linear-gradient(135deg, var(--rose) 0%, var(--rose-light) 100%);
          border: 2px solid var(--rose);
          color: var(--cream-light);
          font-size: 24px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 8px 32px rgba(131,103,91,.2);
          transition: all .3s var(--ease-smooth);
          position: relative;
        }

        .music-toggle:hover {
          transform: scale(1.1);
          box-shadow: 0 12px 48px rgba(131,103,91,.25), 0 0 24px rgba(204,131,138,.25);
          border-color: var(--rose-light);
        }

        .music-toggle:active {
          transform: scale(0.95);
        }

        .player-panel {
          position: absolute;
          bottom: 80px;
          right: 0;
          width: 280px;
          background: var(--cream-light);
          border: 1px solid var(--border-rose);
          border-radius: 16px;
          padding: 20px;
          box-shadow: var(--shadow-xl);
          display: none;
          opacity: 0;
          transform: translateY(10px) scale(.95);
          transition: all .3s var(--ease-smooth);
          backdrop-filter: blur(15px);
          z-index: 101;
        }

        .player-panel.open {
          display: flex;
          flex-direction: column;
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        .player-track {
          display: flex;
          align-items: center;
          gap: 14px;
          margin-bottom: 16px;
          padding-bottom: 16px;
          border-bottom: 1px solid var(--border-rose);
        }

        .vinyl {
          width: 48px;
          height: 48px;
          border-radius: 50%;
          background: linear-gradient(135deg, var(--rose) 0%, var(--rose-light) 100%);
          border: 2px solid var(--rose);
          position: relative;
          flex-shrink: 0;
        }

        .vinyl::before {
          content: '';
          position: absolute;
          inset: 8px;
          border-radius: 50%;
          background: var(--cream);
          opacity: .6;
        }

        .vinyl.spinning {
          animation: spin 3s linear infinite;
        }

        .track-info {
          flex: 1;
          min-width: 0;
        }

        .track-title {
          font-family: 'Cormorant Garamond', serif;
          font-size: 14px;
          font-weight: 500;
          color: var(--text-dark);
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .track-label {
          font-size: 11px;
          color: var(--text-muted);
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          margin-top: 2px;
        }

        .waveform {
          display: flex;
          align-items: flex-end;
          gap: 3px;
          height: 24px;
        }

        .wave-bar {
          width: 3px;
          height: 6px;
          background: linear-gradient(180deg, var(--rose), var(--rose-light));
          border-radius: 2px;
          animation: pulse .6s ease-in-out infinite;
        }

        .waveform:not(.playing) .wave-bar {
          height: 4px;
          animation: none;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: .1s; }
        .wave-bar:nth-child(3) { animation-delay: .2s; }
        .wave-bar:nth-child(4) { animation-delay: .3s; }
        .wave-bar:nth-child(5) { animation-delay: .4s; }

        @keyframes pulse {
          0%, 100% { height: 6px; opacity: .5; }
          50% { height: 18px; opacity: 1; }
        }

        .progress-wrap {
          margin-bottom: 14px;
        }

        .progress-bar {
          height: 4px;
          background: rgba(131,103,91,.15);
          border-radius: 2px;
          cursor: pointer;
          overflow: hidden;
          margin-bottom: 6px;
        }

        .progress-fill {
          height: 100%;
          background: linear-gradient(90deg, var(--rose), var(--rose-light));
          width: 0%;
          transition: width .1s linear;
        }

        .progress-times {
          display: flex;
          justify-content: space-between;
          font-size: 10px;
          color: var(--text-muted);
        }

        .player-controls {
          display: flex;
          justify-content: center;
          gap: 12px;
          margin-bottom: 12px;
        }

        .ctrl-btn {
          width: 36px;
          height: 36px;
          border-radius: 50%;
          background: rgba(131,103,91,.1);
          border: 1px solid var(--border-rose);
          color: var(--rose);
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: all .25s var(--ease-smooth);
        }

        .ctrl-btn:hover {
          background: rgba(204,131,138,.15);
          border-color: var(--rose);
          transform: scale(1.05);
        }

        .ctrl-btn.play-pause {
          width: 44px;
          height: 44px;
          background: linear-gradient(135deg, var(--rose) 0%, var(--rose-light) 100%);
          border-color: var(--rose);
          color: var(--cream-light);
        }

        .volume-wrap {
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .volume-icon {
          font-size: 14px;
        }

        .volume-slider {
          flex: 1;
          height: 4px;
          border-radius: 2px;
          background: rgba(92,26,42,.15);
          outline: none;
          -webkit-appearance: none;
          appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
          -webkit-appearance: none;
          appearance: none;
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: var(--rose);
          cursor: pointer;
          transition: all .25s var(--ease);
        }

        .volume-slider::-webkit-slider-thumb:hover {
          background: var(--rose-light);
          box-shadow: 0 0 12px rgba(204,131,138,.3);
        }

        .volume-slider::-moz-range-thumb {
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: var(--rose);
          border: none;
          cursor: pointer;
          transition: all .25s var(--ease);
        }

        .volume-slider::-moz-range-thumb:hover {
          background: var(--rose-light);
          box-shadow: 0 0 12px rgba(204,131,138,.3);
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
          body { padding: 20px 16px; }

          .hero-backdrop { padding: 40px 24px; }
          .hero-names { font-size: 32px; }
          .hero-names em { font-size: 26px; }

          .countdown { gap: 8px; }
          .countdown-item { padding: 12px 8px; }
          .countdown-number { font-size: 18px; }

          .card-body { padding: 32px 24px; }
          .card-header { padding: 36px 24px 32px; }

          .music-player {
            bottom: 20px;
            right: 20px;
          }

          .music-toggle {
            width: 48px;
            height: 48px;
            font-size: 20px;
          }

          .player-panel {
            width: 240px;
            right: -10px;
            bottom: 65px;
          }
        }

        @media (max-width: 480px) {
          .hero-names { font-size: 26px; }
          .hero-names em { font-size: 20px; }
          .countdown { grid-template-columns: repeat(2, 1fr); }
          .countdown-number { font-size: 20px; }
          .card-title { font-size: 28px; }
          .container { max-width: 100%; }
        }

        /* Smooth fade animations */
        @keyframes fadeDown {
          from { opacity: 0; transform: translateY(-15px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
    </style>
</head>

<body>

<div id="particles" class="particles"></div>

<!-- ════════════════════════════════════════
     CINEMATIC HERO
════════════════════════════════════════ -->
<div class="container">

    <div class="hero">
        <div class="hero-backdrop">
            <div class="hero-content">
                <div class="hero-basmala">وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا</div>

                <div class="hero-ornament">
                    <div class="line"></div>
                    <div class="diamond"></div>
                    <div class="line"></div>
                </div>

                <div class="hero-names">
                    Hassan & Nasreen
                    <em>حسن و نسرين</em>
                </div>

                <div class="hero-date">June 12, 2026</div>

                <!-- Animated Countdown Timer -->
                <div class="countdown" id="countdown">
                    <div class="countdown-item">
                        <span class="countdown-number" id="days">00</span>
                        <span class="countdown-label">Days</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="hours">00</span>
                        <span class="countdown-label">Hours</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="minutes">00</span>
                        <span class="countdown-label">Minutes</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-number" id="seconds">00</span>
                        <span class="countdown-label">Seconds</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════
         LUXURY CARD
    ════════════════════════════════════════ -->
    <div class="card">

        <div class="card-header">
            <div class="card-ornament">
                <div class="line"></div>
                <div class="diamond"></div>
                <div class="line"></div>
            </div>
            <h1 class="card-title">RSVP</h1>
            <p class="card-subtitle">Confirm Your Attendance</p>
        </div>

        <div class="card-body">

            <form id="rsvpForm">

                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" placeholder="Your name" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="attendance">Attendance *</label>
                        <select id="attendance" required>
                            <option value="">Select...</option>
                            <option value="Will Attend">Will Attend</option>
                            <option value="Cannot Attend">Cannot Attend</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="guests">Number of Guests</label>
                        <input type="number" id="guests" placeholder="0" min="0" max="20" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">Notes <span style="font-size:10px;opacity:.45">(optional)</span></label>
                    <textarea id="notes" placeholder="Dietary needs, allergies…"></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <span class="btn-text">Confirm Attendance</span>
                    <span class="spinner"></span>
                </button>

            </form>

            <div id="msg">
                <div class="msg-seal">🥂</div>
                <h3>Thank You</h3>
                <p>We can't wait to celebrate with you.<br>See you on the 12th!</p>
                <div class="gold-rule"></div>
            </div>

        </div>

    </div>

</div><!-- /container -->

<!-- ════════════════════════════════════════
     MUSIC PLAYER
════════════════════════════════════════ -->
<audio id="weddingAudio" loop preload="none">
    <source src="bsmkhalqAlhob.m4a" type="audio/mpeg" />
</audio>

<div class="music-player" id="musicPlayer">
    <div class="player-panel" id="playerPanel">
        <div class="player-track">
            <div class="vinyl" id="vinyl"></div>
            <div class="track-info">
                <div class="track-title">بسم خالق الحب نبدأ</div>
<!--                <div class="track-label">حسين الجسمي</div>-->
            </div>
            <div class="waveform" id="waveform">
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-times"><span id="timeNow">0:00</span><span id="timeTot">–:––</span></div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" id="btnRestart" title="Restart" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/></svg>
            </button>
            <button class="ctrl-btn play-pause" id="btnPlay" title="Play / Pause" type="button">
                <svg id="iconPlay"  width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                <svg id="iconPause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="ctrl-btn" id="btnMute" title="Mute" type="button">
                <svg id="iconVol"  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <svg id="iconMute" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            </button>
        </div>
        <div class="volume-wrap">
            <span class="volume-icon">🔈</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.6" />
        </div>
    </div>
    <button class="music-toggle" id="musicToggle" title="Music" type="button">🎵</button>
</div>

<script>
    /* ══════════════════════════════════════
       COUNTDOWN TIMER
    ══════════════════════════════════════ */
    function updateCountdown() {
        const weddingDate = new Date('2026-06-12T17:00:00').getTime();

        function update() {
            const now = new Date().getTime();
            const diff = weddingDate - now;

            if (diff > 0) {
                document.getElementById('days').textContent = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
                document.getElementById('hours').textContent = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById('minutes').textContent = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById('seconds').textContent = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            }
        }

        update();
        setInterval(update, 1000);
    }
    updateCountdown();

    /* ══════════════════════════════════════
       RSVP — UPDATED scriptURL
    ══════════════════════════════════════ */
    const scriptURL = "https://script.google.com/macros/s/AKfycby6W5ioMAzBBFb_UWVqYo7G6Guj8u-H6AjZPWLS4uIpdqyH0hrSCES8C3RE-dnY77PI/exec";

    document.getElementById("rsvpForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn  = document.querySelector(".btn-submit");
      const form = document.getElementById("rsvpForm");
      btn.classList.add("loading");
      const data = {
        name:       document.getElementById("name").value,
        attendance: document.getElementById("attendance").value,
        guests:     document.getElementById("guests").value || "0",
        notes:      document.getElementById("notes").value,
      };
      try {
        await fetch(scriptURL, { method:"POST", body: JSON.stringify(data) });
      } catch(err) {
        console.log("Form submitted (may be offline)");
      }
      btn.classList.remove("loading");
      form.reset();
      document.getElementById("msg").classList.add("visible");
      form.style.display = "none";
    });

    /* ══════════════════════════════════════
       GOLD PARTICLES
    ══════════════════════════════════════ */
    (function() {
      const c = document.getElementById("particles");
      for (let i = 0; i < 28; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const s = 1.5 + Math.random() * 4;
        const delay = Math.random() * 20;
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          bottom: ${Math.random() * 20}%;
          width: ${s}px;
          height: ${s}px;
          animation-duration: ${11 + Math.random() * 16}s;
          animation-delay: -${delay}s;
        `;
        c.appendChild(p);
      }
    })();

    /* ══════════════════════════════════════
       MUSIC PLAYER
    ══════════════════════════════════════ */
    const audio        = document.getElementById("weddingAudio");
    const toggleBtn    = document.getElementById("musicToggle");
    const panel        = document.getElementById("playerPanel");
    const btnPlay      = document.getElementById("btnPlay");
    const btnRestart   = document.getElementById("btnRestart");
    const btnMute      = document.getElementById("btnMute");
    const iconPlay     = document.getElementById("iconPlay");
    const iconPause    = document.getElementById("iconPause");
    const iconVol      = document.getElementById("iconVol");
    const iconMute     = document.getElementById("iconMute");
    const progressFill = document.getElementById("progressFill");
    const progressBar  = document.getElementById("progressBar");
    const timeNow      = document.getElementById("timeNow");
    const timeTot      = document.getElementById("timeTot");
    const volumeSlider = document.getElementById("volumeSlider");
    const vinyl        = document.getElementById("vinyl");
    const waveform     = document.getElementById("waveform");

    let isPlaying = false, panelOpen = false;
    audio.volume = 0.6;

    function fmt(s) {
        if (!s || isNaN(s)) return "0:00";
        return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, "0")}`;
    }

    toggleBtn.addEventListener("click", () => {
        panelOpen = !panelOpen;
        panel.classList.toggle("open", panelOpen);
    });

    function setPlaying(state) {
      isPlaying = state;
      if (isPlaying) {
        audio.play();
        iconPlay.style.display = "none";
        iconPause.style.display = "block";
        vinyl.classList.add("spinning");
        waveform.classList.add("playing");
        toggleBtn.classList.add("is-playing");
        toggleBtn.textContent = "🎶";
      } else {
        audio.pause();
        iconPlay.style.display = "block";
        iconPause.style.display = "none";
        vinyl.classList.remove("spinning");
        waveform.classList.remove("playing");
        toggleBtn.classList.remove("is-playing");
        toggleBtn.textContent = "🎵";
      }
    }

    btnPlay.addEventListener("click", () => setPlaying(!isPlaying));
    btnRestart.addEventListener("click", () => {
        audio.currentTime = 0;
        if (!isPlaying) setPlaying(true);
    });
    btnMute.addEventListener("click", () => {
        audio.muted = !audio.muted;
        iconVol.style.display = audio.muted ? "none" : "block";
        iconMute.style.display = audio.muted ? "block" : "none";
    });

    volumeSlider.addEventListener("input", function() {
        audio.volume = this.value;
        if (audio.muted && this.value > 0) {
            audio.muted = false;
            iconVol.style.display = "block";
            iconMute.style.display = "none";
        }
    });

    audio.addEventListener("timeupdate", () => {
        if (!audio.duration) return;
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + "%";
        timeNow.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener("loadedmetadata", () => {
        timeTot.textContent = fmt(audio.duration);
    });

    progressBar.addEventListener("click", (e) => {
        if (!audio.duration) return;
        const r = progressBar.getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    });

    let autoStarted = false;
    function tryAutoStart() {
        if (autoStarted) return;
        autoStarted = true;
        panelOpen = true;
        panel.classList.add("open");
        setPlaying(true);
    }

    document.addEventListener("click", tryAutoStart, { once: true });
    document.addEventListener("touchstart", tryAutoStart, { once: true });
    document.addEventListener("scroll", tryAutoStart, { once: true });
</script>

</body>
</html>

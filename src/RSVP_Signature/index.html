<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding RSVP — حسن و نسرين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet" />

    <style>
        /* ════════════════════════════════════════
           DESIGN TOKENS — extracted from invitation
           Burgundy #5c1a2a · Gold #c9a84c · Ivory #f5ead8
        ════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --burg-deep:   #3a0d18;
          --burg:        #5c1a2a;
          --burg-mid:    #7a2438;
          --gold:        #c9a84c;
          --gold-light:  #e2c97e;
          --gold-dim:    rgba(201,168,76,.35);
          --ivory:       #f5ead8;
          --cream:       #faf4ec;
          --text-dark:   #2a0e16;
          --text-mid:    #6b3344;
          --text-muted:  #9e7060;
          --border-gold: rgba(201,168,76,.3);
          --shadow-lg:   0 40px 100px rgba(58,13,24,.35);
          --radius:      4px;
          --radius-lg:   18px;
          --ease:        cubic-bezier(.4,0,.2,1);
        }

        html { scroll-behavior: smooth; }

        body {
          min-height: 100vh;
          background: var(--burg-deep);
          font-family: 'Jost', sans-serif;
          font-weight: 300;
          color: var(--ivory);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px 20px;
          position: relative;
          overflow-x: hidden;
        }

        /* Rich vignette layers */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background:
            radial-gradient(ellipse 90% 60% at 50%  0%,  rgba(122,36,56,.6)  0%, transparent 65%),
            radial-gradient(ellipse 70% 50% at 100% 100%, rgba(92,26,42,.45) 0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 0%  80%,  rgba(201,168,76,.05) 0%, transparent 50%);
          pointer-events: none;
          z-index: 0;
        }

        /* Diagonal gold texture */
        body::after {
          content: '';
          position: fixed;
          inset: 0;
          background-image: repeating-linear-gradient(
            135deg,
            transparent, transparent 70px,
            rgba(201,168,76,.022) 70px,
            rgba(201,168,76,.022) 71px
          );
          pointer-events: none;
          z-index: 0;
        }

        /* ── Floating gold particles ── */
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle {
          position: absolute;
          border-radius: 50%;
          background: var(--gold);
          opacity: 0;
          animation: floatUp linear infinite;
        }
        @keyframes floatUp {
          0%   { opacity: 0; transform: translateY(0) scale(0); }
          10%  { opacity: .4; }
          90%  { opacity: .15; }
          100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
        }

        /* ══════════════════════════════════════
           CARD
        ══════════════════════════════════════ */
        .card {
          position: relative;
          z-index: 1;
          background: var(--cream);
          width: 100%;
          max-width: 500px;
          border-radius: var(--radius-lg);
          box-shadow: var(--shadow-lg);
          overflow: hidden;
          animation: revealCard .9s var(--ease) both;
          border: 1px solid var(--border-gold);
        }

        /* Inner gold border frame */
        .card::before {
          content: '';
          position: absolute;
          inset: 7px;
          border: 1px solid var(--border-gold);
          border-radius: calc(var(--radius-lg) - 3px);
          pointer-events: none;
          z-index: 10;
        }

        /* ══════════════════════════════════════
           HERO
        ══════════════════════════════════════ */
        .card-hero {
          background: linear-gradient(170deg, var(--burg-deep) 0%, var(--burg) 52%, var(--burg-mid) 100%);
          padding: 52px 44px 48px;
          text-align: center;
          position: relative;
          overflow: hidden;
        }

        /* Fabric shimmer at base of hero */
        .card-hero::after {
          content: '';
          position: absolute;
          bottom: -24px; left: 50%;
          transform: translateX(-50%);
          width: 140%; height: 60px;
          background: radial-gradient(ellipse at center, rgba(201,168,76,.15) 0%, transparent 70%);
          pointer-events: none;
        }

        /* ── Corner filigree ── */
        .corner { position: absolute; width: 52px; height: 52px; opacity: .55; }
        .corner svg { width: 100%; height: 100%; }
        .corner--tl { top: 12px;  left: 12px; }
        .corner--tr { top: 12px;  right: 12px; transform: scaleX(-1); }
        .corner--bl { bottom: 12px; left: 12px;  transform: scaleY(-1); }
        .corner--br { bottom: 12px; right: 12px; transform: scale(-1,-1); }

        /* Arabic basmala */
        .hero-basmala {
          font-family: 'Scheherazade New', serif;
          font-size: 18px;
          color: var(--gold-light);
          letter-spacing: 1px;
          margin-bottom: 22px;
          opacity: .9;
          animation: fadeDown .8s var(--ease) .15s both;
        }

        /* Gold ornamental line */
        .ornament-line {
          display: flex;
          align-items: center;
          margin: 0 auto 18px;
          max-width: 240px;
          animation: fadeDown .8s var(--ease) .25s both;
        }
        .ornament-line .line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
        .ornament-line .diamond {
          width: 7px; height: 7px;
          background: var(--gold);
          transform: rotate(45deg);
          margin: 0 10px;
          flex-shrink: 0;
        }

        .hero-subtitle {
          font-size: 10px;
          letter-spacing: 6px;
          text-transform: uppercase;
          color: rgba(201,168,76,.6);
          font-weight: 400;
          margin-bottom: 16px;
          animation: fadeDown .8s var(--ease) .3s both;
        }

        /* Couple names */
        .hero-names {
          font-family: 'Cormorant Garamond', serif;
          font-weight: 300;
          font-size: clamp(44px, 11vw, 62px);
          color: #faf4ec;
          line-height: 1.05;
          letter-spacing: 2px;
          animation: fadeDown .8s var(--ease) .38s both;
          direction: rtl;
        }
        .hero-names em,
        .hero-names .name { font-style: italic; color: #faf4ec !important; }
        .hero-names .amp { font-family: 'Cormorant Garamond', serif; font-style: italic; color: rgba(255,255,255,.35); font-size: .5em; margin: 0 12px; vertical-align: middle; letter-spacing: 0; }

        /* Date / venue */
        .hero-date {
          margin-top: 22px;
          font-size: 11px;
          letter-spacing: 3px;
          color: rgba(255,255,255,.45);
          font-weight: 400;
          animation: fadeDown .8s var(--ease) .46s both;
        }
        .hero-date strong {
          display: block;
          font-family: 'Cormorant Garamond', serif;
          font-size: 22px;
          font-weight: 300;
          color: var(--gold-light);
          letter-spacing: 4px;
          margin-top: 6px;
        }

        /* ── Wave separator ── */
        .wave-sep { display: block; background: var(--burg); line-height: 0; }
        .wave-sep svg { display: block; width: 100%; }

        /* ══════════════════════════════════════
           FORM BODY
        ══════════════════════════════════════ */
        .card-body { background: var(--cream); padding: 40px 44px 50px; }

        .form-heading { text-align: center; margin-bottom: 34px; }
        .form-heading p {
          font-size: 10px;
          letter-spacing: 5px;
          text-transform: uppercase;
          color: var(--text-muted);
          margin-bottom: 8px;
        }
        .form-heading h2 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 28px;
          font-weight: 300;
          color: var(--burg);
          font-style: italic;
        }
        .gold-rule {
          width: 60px; height: 1px;
          background: linear-gradient(90deg, transparent, var(--gold), transparent);
          margin: 14px auto 0;
        }

        .form-group { margin-bottom: 24px; }

        label {
          display: block;
          font-size: 10px;
          letter-spacing: 3px;
          text-transform: uppercase;
          color: var(--text-mid);
          margin-bottom: 8px;
          font-weight: 500;
        }

        input, select, textarea {
          width: 100%;
          padding: 14px 18px;
          background: #fff;
          border: 1px solid rgba(92,26,42,.13);
          border-bottom: 2px solid rgba(92,26,42,.18);
          border-radius: var(--radius);
          font-family: 'Jost', sans-serif;
          font-size: 15px;
          font-weight: 300;
          color: var(--text-dark);
          transition: border-color .25s var(--ease), box-shadow .25s var(--ease);
          outline: none;
          appearance: none;
          -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus {
          border-color: rgba(92,26,42,.25);
          border-bottom-color: var(--gold);
          box-shadow: 0 4px 20px rgba(201,168,76,.1);
        }
        input::placeholder, textarea::placeholder { color: rgba(106,51,68,.3); }

        .select-wrap { position: relative; }
        .select-wrap::after {
          content: '';
          position: absolute;
          right: 18px; top: 46%;
          width: 7px; height: 7px;
          border-right: 1.5px solid var(--text-muted);
          border-bottom: 1.5px solid var(--text-muted);
          transform: translateY(-50%) rotate(45deg);
          pointer-events: none;
        }

        textarea { resize: vertical; min-height: 100px; line-height: 1.7; }

        /* ── Submit button ── */
        .btn-submit {
          width: 100%;
          padding: 17px;
          background: linear-gradient(135deg, var(--burg-deep), var(--burg-mid));
          color: var(--gold-light);
          border: 1px solid var(--gold-dim);
          border-radius: var(--radius);
          font-family: 'Jost', sans-serif;
          font-size: 11px;
          font-weight: 500;
          letter-spacing: 5px;
          text-transform: uppercase;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition: transform .2s var(--ease), box-shadow .2s var(--ease), opacity .2s;
          box-shadow: 0 8px 32px rgba(58,13,24,.28);
          margin-top: 8px;
        }
        /* Gold shimmer sweep */
        .btn-submit::after {
          content: '';
          position: absolute;
          top: 0; left: -100%;
          width: 60%; height: 100%;
          background: linear-gradient(90deg, transparent, rgba(201,168,76,.2), transparent);
          transform: skewX(-20deg);
          transition: left .55s var(--ease);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(58,13,24,.38); }
        .btn-submit:hover::after { left: 160%; }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit.loading { opacity: .7; pointer-events: none; }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner  { display: block; }

        .spinner {
          display: none;
          width: 18px; height: 18px;
          border: 2px solid rgba(201,168,76,.3);
          border-top-color: var(--gold-light);
          border-radius: 50%;
          animation: spin .7s linear infinite;
          margin: 0 auto;
        }

        /* ── Success ── */
        #msg { display: none; text-align: center; padding: 32px 20px; animation: fadeIn .5s var(--ease); }
        .msg-seal {
          width: 64px; height: 64px;
          background: linear-gradient(135deg, var(--burg-deep), var(--burg-mid));
          border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          font-size: 26px;
          margin: 0 auto 18px;
          border: 1px solid var(--gold-dim);
          box-shadow: 0 8px 28px rgba(58,13,24,.22);
        }
        #msg h3 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 28px; font-weight: 300; font-style: italic;
          color: var(--burg); margin-bottom: 8px;
        }
        #msg p { color: var(--text-muted); font-size: 14px; line-height: 1.7; }
        #msg .gold-rule { margin-top: 18px; }
        #msg.visible { display: block; }

        /* ════════════════════════════════
           MUSIC PLAYER
        ════════════════════════════════ */
        .music-player {
          position: fixed;
          bottom: 28px; right: 28px;
          z-index: 999;
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          gap: 12px;
        }

        .player-panel {
          background: var(--burg-deep);
          border: 1px solid var(--border-gold);
          border-radius: 16px;
          box-shadow: 0 16px 56px rgba(58,13,24,.55);
          padding: 20px 22px 16px;
          width: 268px;
          transform-origin: bottom right;
          transform: scale(.85) translateY(10px);
          opacity: 0;
          pointer-events: none;
          transition: transform .35s var(--ease), opacity .3s var(--ease);
        }
        .player-panel.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

        .player-track { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }

        .vinyl {
          width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
          background: conic-gradient(
            var(--burg-deep) 0deg 40deg,  var(--gold) 40deg 50deg,
            var(--burg)      50deg 130deg, var(--gold) 130deg 140deg,
            var(--burg-deep) 140deg 220deg,var(--gold) 220deg 230deg,
            var(--burg)      230deg 310deg,var(--gold) 310deg 320deg,
            var(--burg-deep) 320deg 360deg
          );
          position: relative;
        }
        .vinyl.spinning { animation: vinylSpin 3s linear infinite; }
        .vinyl::after {
          content: ''; position: absolute; inset: 32%;
          background: var(--burg-deep); border-radius: 50%;
          box-shadow: 0 0 0 2px var(--gold-dim);
        }

        .track-title { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--ivory); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-top: 3px; opacity: .7; }

        .waveform { display: flex; align-items: center; gap: 2.5px; height: 18px; }
        .wave-bar  { width: 3px; border-radius: 2px; background: var(--gold); height: 4px; opacity: .4; }
        .waveform.playing .wave-bar { animation: wavePulse 1s ease-in-out infinite; opacity: 1; }
        .waveform.playing .wave-bar:nth-child(1){ animation-delay:0s;   animation-duration:.9s; }
        .waveform.playing .wave-bar:nth-child(2){ animation-delay:.15s; animation-duration:.7s; }
        .waveform.playing .wave-bar:nth-child(3){ animation-delay:.05s; animation-duration:1.1s;}
        .waveform.playing .wave-bar:nth-child(4){ animation-delay:.25s; animation-duration:.8s; }
        .waveform.playing .wave-bar:nth-child(5){ animation-delay:.1s;  animation-duration:.95s;}

        .progress-bar { width:100%; height:2px; background:rgba(255,255,255,.1); border-radius:10px; overflow:hidden; cursor:pointer; }
        .progress-fill{ height:100%; background:linear-gradient(90deg,var(--burg-mid),var(--gold)); border-radius:10px; width:0%; transition:width .5s linear; }
        .progress-times{ display:flex; justify-content:space-between; font-size:10px; color:rgba(255,255,255,.3); margin-top:5px; letter-spacing:1px; }
        .progress-wrap { margin-bottom: 14px; }

        .player-controls { display:flex; align-items:center; justify-content:space-between; }
        .ctrl-btn { background:none; border:none; cursor:pointer; padding:6px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.38); transition:color .2s,background .2s; }
        .ctrl-btn:hover { color:var(--gold-light); background:rgba(201,168,76,.1); }
        .ctrl-btn.play-pause { width:40px; height:40px; background:linear-gradient(135deg,var(--gold),var(--gold-light)); color:var(--burg-deep); box-shadow:0 4px 16px rgba(201,168,76,.3); }
        .ctrl-btn.play-pause:hover { transform:scale(1.08); color:var(--burg-deep); }

        .volume-wrap { display:flex; align-items:center; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid rgba(201,168,76,.15); }
        .volume-icon { font-size:12px; color:rgba(255,255,255,.3); }
        input[type=range].volume-slider { flex:1; height:2px; background:rgba(255,255,255,.15); border-radius:10px; outline:none; appearance:none; -webkit-appearance:none; padding:0; border:none; cursor:pointer; }
        input[type=range].volume-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:var(--gold); border-radius:50%; cursor:pointer; box-shadow:0 2px 8px rgba(201,168,76,.5); }

        .music-toggle {
          width:54px; height:54px; border-radius:50%;
          background:linear-gradient(135deg,var(--burg-deep),var(--burg-mid));
          border:1px solid var(--border-gold);
          cursor:pointer; display:flex; align-items:center; justify-content:center;
          box-shadow:0 8px 28px rgba(58,13,24,.5);
          transition:transform .25s var(--ease),box-shadow .25s var(--ease);
          color:var(--gold-light); font-size:20px;
          position: relative;
        }
        .music-toggle:hover { transform:scale(1.1); box-shadow:0 12px 36px rgba(58,13,24,.6); }
        .music-toggle.is-playing::before {
          content:''; position:absolute; width:54px; height:54px; border-radius:50%;
          border:1.5px solid var(--gold); opacity:0; animation:pulseRing 2s ease-out infinite;
        }

        /* ════════════════════════════════
           KEYFRAMES
        ════════════════════════════════ */
        @keyframes revealCard { from{opacity:0;transform:translateY(36px) scale(.97);} to{opacity:1;transform:translateY(0) scale(1);} }
        @keyframes fadeDown   { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
        @keyframes fadeIn     { from{opacity:0;} to{opacity:1;} }
        @keyframes spin       { to{transform:rotate(360deg);} }
        @keyframes vinylSpin  { to{transform:rotate(360deg);} }
        @keyframes wavePulse  { 0%,100%{height:4px;} 50%{height:16px;} }
        @keyframes pulseRing  { 0%{transform:scale(.9);opacity:.5;} 100%{transform:scale(1.6);opacity:0;} }

        /* ── Responsive ── */
        @media (max-width: 540px) {
          .card-hero { padding: 38px 26px 40px; }
          .card-body  { padding: 30px 26px 42px; }
          .hero-names { font-size: clamp(36px, 12vw, 50px); }
          .music-player { bottom: 16px; right: 16px; }
          .player-panel { width: 240px; }
          .card::before { inset: 5px; }
          .corner { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

<!-- Gold floating particles -->
<div class="particles" id="particles"></div>

<!-- ══════════ MAIN CARD ══════════ -->
<div class="card">

    <!-- HERO -->
    <div class="card-hero">

        <!-- Corner ornaments -->
        <div class="corner corner--tl"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3 L3 24 M3 3 L24 3" stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round"/><path d="M3 3 Q16 3 16 16" stroke="#c9a84c" stroke-width=".9" fill="none" opacity=".55"/><circle cx="3" cy="3" r="2.2" fill="#c9a84c"/><circle cx="24" cy="3" r="1.1" fill="#c9a84c" opacity=".45"/><circle cx="3" cy="24" r="1.1" fill="#c9a84c" opacity=".45"/></svg></div>
        <div class="corner corner--tr"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3 L3 24 M3 3 L24 3" stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round"/><path d="M3 3 Q16 3 16 16" stroke="#c9a84c" stroke-width=".9" fill="none" opacity=".55"/><circle cx="3" cy="3" r="2.2" fill="#c9a84c"/><circle cx="24" cy="3" r="1.1" fill="#c9a84c" opacity=".45"/><circle cx="3" cy="24" r="1.1" fill="#c9a84c" opacity=".45"/></svg></div>
        <div class="corner corner--bl"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3 L3 24 M3 3 L24 3" stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round"/><path d="M3 3 Q16 3 16 16" stroke="#c9a84c" stroke-width=".9" fill="none" opacity=".55"/><circle cx="3" cy="3" r="2.2" fill="#c9a84c"/><circle cx="24" cy="3" r="1.1" fill="#c9a84c" opacity=".45"/><circle cx="3" cy="24" r="1.1" fill="#c9a84c" opacity=".45"/></svg></div>
        <div class="corner corner--br"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3 L3 24 M3 3 L24 3" stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round"/><path d="M3 3 Q16 3 16 16" stroke="#c9a84c" stroke-width=".9" fill="none" opacity=".55"/><circle cx="3" cy="3" r="2.2" fill="#c9a84c"/><circle cx="24" cy="3" r="1.1" fill="#c9a84c" opacity=".45"/><circle cx="3" cy="24" r="1.1" fill="#c9a84c" opacity=".45"/></svg></div>

        <p class="hero-basmala">الحمد لله الذي بنعمته تتم الصالحات</p>

        <div class="ornament-line">
            <span class="line"></span><span class="diamond"></span><span class="line"></span>
        </div>

        <p class="hero-subtitle">You Are Invited</p>

        <h1 class="hero-names">
            <span class="name">Hasan</span><span class="amp">&amp;</span><span class="name">Nasreen</span>
        </h1>

        <div class="ornament-line" style="margin-top:20px;margin-bottom:0">
            <span class="line"></span><span class="diamond"></span><span class="line"></span>
        </div>

        <div class="hero-date">
            <span>في قاعة الأنوار · تمام الساعة التاسعة</span>
            <strong>12 · 2 · 2025</strong>
        </div>

    </div>

    <!-- Wave transition hero → form -->
    <span class="wave-sep">
    <svg viewBox="0 0 500 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,0 C100,30 180,30 250,15 C320,0 420,0 500,15 L500,0 Z" fill="#faf4ec"/>
    </svg>
  </span>

    <!-- RSVP FORM -->
    <div class="card-body">

        <div class="form-heading">
            <p>Kindly Reply</p>
            <h2>Confirm Your Attendance</h2>
            <div class="gold-rule"></div>
        </div>

        <form id="rsvpForm" novalidate>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Your name" required autocomplete="name" />
            </div>

            <div class="form-group">
                <label for="attendance">Will You Attend?</label>
                <div class="select-wrap">
                    <select id="attendance">
                        <option value="Will Attend">Will Attend</option>
                        <option value="Cannot Attend">Cannot Attend</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="guests">Number of Guests</label>
                <input type="number" id="guests" placeholder="0" min="0" max="20" />
            </div>

            <div class="form-group">
                <label for="notes">Notes <span style="font-size:10px;opacity:.45">(optional)</span></label>
                <textarea id="notes" placeholder="Dietary needs, allergies…"></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <span class="btn-text">Confirm Attendance</span>
                <span class="spinner"></span>
            </button>

        </form>

        <div id="msg">
            <div class="msg-seal">🥂</div>
            <h3>Thank You</h3>
            <p>We can't wait to celebrate with you.<br>See you on the 12th!</p>
            <div class="gold-rule"></div>
        </div>

    </div>
</div><!-- /card -->

<!-- ════════════════════════════════
     MUSIC PLAYER — DO NOT modify audio src or any IDs
════════════════════════════════ -->
<audio id="weddingAudio" loop preload="none">
    <source src="EdkhiliOmri.mp3" type="audio/mpeg" />
</audio>

<div class="music-player" id="musicPlayer">
    <div class="player-panel" id="playerPanel">
        <div class="player-track">
            <div class="vinyl" id="vinyl"></div>
            <div class="track-info">
                <div class="track-title">ادخلي عمري</div>
                <div class="track-label">حسين الجسمي</div>
            </div>
            <div class="waveform" id="waveform">
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-times"><span id="timeNow">0:00</span><span id="timeTot">–:––</span></div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" id="btnRestart" title="Restart">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/></svg>
            </button>
            <button class="ctrl-btn play-pause" id="btnPlay" title="Play / Pause">
                <svg id="iconPlay"  width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                <svg id="iconPause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="ctrl-btn" id="btnMute" title="Mute">
                <svg id="iconVol"  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <svg id="iconMute" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            </button>
        </div>
        <div class="volume-wrap">
            <span class="volume-icon">🔈</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.6" />
        </div>
    </div>
    <button class="music-toggle" id="musicToggle" title="Music">🎵</button>
</div>

<script>
    /* ══════════════════════════════════════
       RSVP — DO NOT modify scriptURL
    ══════════════════════════════════════ */
    const scriptURL = "https://script.google.com/macros/s/AKfycbx8So8Wf4mlpjkaKU7pjRy3weyjnI9YjN9lFZ7CLmsNYoTbV7glyjKKFXGbaSOxZRB6/exec";

    document.getElementById("rsvpForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn  = document.querySelector(".btn-submit");
      const form = document.getElementById("rsvpForm");
      btn.classList.add("loading");
      const data = {
        name:       document.getElementById("name").value,
        attendance: document.getElementById("attendance").value,
        guests:     document.getElementById("guests").value,
        notes:      document.getElementById("notes").value,
      };
      try { await fetch(scriptURL, { method:"POST", body: JSON.stringify(data) }); } catch(_){}
      btn.classList.remove("loading");
      form.reset();
      document.getElementById("msg").classList.add("visible");
      form.style.display = "none";
    });

    /* ══════════════════════════════════════
       GOLD PARTICLES
    ══════════════════════════════════════ */
    (function() {
      const c = document.getElementById("particles");
      for (let i = 0; i < 24; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const s = 1 + Math.random() * 3;
        p.style.cssText = `left:${Math.random()*100}%;bottom:${Math.random()*15}%;width:${s}px;height:${s}px;animation-duration:${9+Math.random()*14}s;animation-delay:-${Math.random()*14}s;`;
        c.appendChild(p);
      }
    })();

    /* ══════════════════════════════════════
       MUSIC PLAYER — all IDs and logic unchanged
    ══════════════════════════════════════ */
    const audio        = document.getElementById("weddingAudio");
    const toggleBtn    = document.getElementById("musicToggle");
    const panel        = document.getElementById("playerPanel");
    const btnPlay      = document.getElementById("btnPlay");
    const btnRestart   = document.getElementById("btnRestart");
    const btnMute      = document.getElementById("btnMute");
    const iconPlay     = document.getElementById("iconPlay");
    const iconPause    = document.getElementById("iconPause");
    const iconVol      = document.getElementById("iconVol");
    const iconMute     = document.getElementById("iconMute");
    const progressFill = document.getElementById("progressFill");
    const progressBar  = document.getElementById("progressBar");
    const timeNow      = document.getElementById("timeNow");
    const timeTot      = document.getElementById("timeTot");
    const volumeSlider = document.getElementById("volumeSlider");
    const vinyl        = document.getElementById("vinyl");
    const waveform     = document.getElementById("waveform");

    let isPlaying = false, panelOpen = false;
    audio.volume = 0.6;

    function fmt(s){ if(!s||isNaN(s))return"0:00"; return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`; }

    toggleBtn.addEventListener("click", ()=>{ panelOpen=!panelOpen; panel.classList.toggle("open",panelOpen); });

    function setPlaying(state) {
      isPlaying = state;
      if(isPlaying){
        audio.play();
        iconPlay.style.display="none"; iconPause.style.display="block";
        vinyl.classList.add("spinning"); waveform.classList.add("playing");
        toggleBtn.classList.add("is-playing"); toggleBtn.textContent="🎶";
      } else {
        audio.pause();
        iconPlay.style.display="block"; iconPause.style.display="none";
        vinyl.classList.remove("spinning"); waveform.classList.remove("playing");
        toggleBtn.classList.remove("is-playing"); toggleBtn.textContent="🎵";
      }
    }

    btnPlay.addEventListener("click",    ()=>setPlaying(!isPlaying));
    btnRestart.addEventListener("click", ()=>{ audio.currentTime=0; if(!isPlaying)setPlaying(true); });
    btnMute.addEventListener("click",    ()=>{ audio.muted=!audio.muted; iconVol.style.display=audio.muted?"none":"block"; iconMute.style.display=audio.muted?"block":"none"; });
    volumeSlider.addEventListener("input", function(){ audio.volume=this.value; if(audio.muted&&this.value>0){audio.muted=false;iconVol.style.display="block";iconMute.style.display="none";} });
    audio.addEventListener("timeupdate",    ()=>{ if(!audio.duration)return; progressFill.style.width=(audio.currentTime/audio.duration*100)+"%"; timeNow.textContent=fmt(audio.currentTime); });
    audio.addEventListener("loadedmetadata",()=>{ timeTot.textContent=fmt(audio.duration); });
    progressBar.addEventListener("click",   (e)=>{ if(!audio.duration)return; const r=progressBar.getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; });

    let autoStarted = false;
    function tryAutoStart(){ if(autoStarted)return; autoStarted=true; panelOpen=true; panel.classList.add("open"); setPlaying(true); }
    document.addEventListener("click",      tryAutoStart, {once:true});
    document.addEventListener("touchstart", tryAutoStart, {once:true});
    document.addEventListener("scroll",     tryAutoStart, {once:true});
</script>

</body>
</html>

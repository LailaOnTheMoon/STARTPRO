<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Dashboard — حسن و نسرين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=Scheherazade+New:wght@400&display=swap" rel="stylesheet" />

    <style>
        /* ════════════════════════════════════════
           TOKENS — Neutral Rose Palette
           Cream #EFEBE5 · Beige #E2DED7 · Rose #CC838A · Brown #83675B
        ════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --cream:       #EFEBE5;
          --cream-light: #f5f3f0;
          --beige:       #E2DED7;
          --beige-light: #E8E4DC;
          --taupe:       #BCB7B4;
          --taupe-dark:  #95908D;
          --rose:        #CC838A;
          --rose-light:  #d9959f;
          --brown:       #83675B;
          --brown-dark:  #6d5449;
          --text-dark:   #3d312a;
          --text-mid:    #6d5449;
          --text-muted:  #95908D;
          --border-rose: rgba(204,131,138,.22);
          --border-card: rgba(204,131,138,.15);
          --shadow:      0 4px 24px rgba(131,103,91,.08);
          --shadow-lg:   0 16px 48px rgba(131,103,91,.12);
          --radius:      14px;
          --ease:        cubic-bezier(.4,0,.2,1);
          --ease-smooth: cubic-bezier(.25,.46,.45,.94);
        }

        html { scroll-behavior: smooth; }

        body {
          min-height: 100vh;
          background: var(--cream);
          font-family: 'Jost', sans-serif;
          font-weight: 300;
          color: var(--text-dark);
        }

        /* Subtle warm background glow */
        body::before {
          content: '';
          position: fixed; inset: 0;
          background:
            radial-gradient(ellipse 70% 50% at 0%   0%,   rgba(204,131,138,.07)   0%, transparent 55%),
            radial-gradient(ellipse 60% 40% at 100% 100%,  rgba(131,103,91,.05)  0%, transparent 50%);
          pointer-events: none; z-index: 0;
        }

        /* Diagonal gold texture */
        body::after {
          content: '';
          position: fixed; inset: 0;
          background-image: repeating-linear-gradient(
            135deg, transparent, transparent 80px,
            rgba(131,103,91,.015) 80px, rgba(131,103,91,.015) 81px
          );
          pointer-events: none; z-index: 0;
        }

        /* ════════════════════════════════
           PASSWORD GATE — PREMIUM
        ════════════════════════════════ */
        #gate {
          position: fixed; inset: 0; z-index: 9999;
          background: var(--cream);
          display: flex; align-items: center; justify-content: center;
          padding: 24px;
        }

        #gate::before {
          content: '';
          position: fixed; inset: 0;
          background:
            radial-gradient(ellipse 90% 60% at 50% 0%,   rgba(204,131,138,.12)  0%, transparent 65%),
            radial-gradient(ellipse 70% 50% at 100% 100%, rgba(131,103,91,.1)  0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 0%   80%,  rgba(204,131,138,.05) 0%, transparent 50%);
          pointer-events: none;
        }

        #gate::after {
          content: '';
          position: fixed; inset: 0;
          background-image: repeating-linear-gradient(
            135deg, transparent, transparent 70px,
            rgba(131,103,91,.02) 70px, rgba(131,103,91,.02) 71px
          );
          pointer-events: none;
        }

        .gate-card {
          position: relative; z-index: 1;
          background: var(--cream-light);
          border-radius: 20px;
          box-shadow: 0 40px 100px rgba(131,103,91,.15);
          border: 1px solid var(--border-rose);
          width: 100%; max-width: 420px;
          overflow: hidden;
          animation: fadeUp .7s var(--ease) both;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(40px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .gate-card::before {
          content: '';
          position: absolute; inset: 7px;
          border: 1px solid var(--border-rose);
          border-radius: 14px;
          pointer-events: none; z-index: 10;
        }

        .gate-hero {
          background: linear-gradient(160deg, var(--cream) 0%, var(--beige) 55%, var(--taupe) 100%);
          padding: 48px 36px 40px;
          text-align: center;
          position: relative; overflow: hidden;
        }

        .gate-hero::before {
          content: '';
          position: absolute; inset: 0;
          background:
            radial-gradient(ellipse 80% 100% at 50% 0%, rgba(204,131,138,.1) 0%, transparent 70%),
            radial-gradient(ellipse 100% 80% at 50% 100%, rgba(131,103,91,.08) 0%, transparent 60%);
          pointer-events: none;
        }

        .gate-hero::after {
          content: '';
          position: absolute; bottom: -20px; left: 50%;
          transform: translateX(-50%);
          width: 140%; height: 50px;
          background: radial-gradient(ellipse at center, rgba(204,131,138,.12) 0%, transparent 70%);
          pointer-events: none;
        }

        .gate-icon {
          font-size: 48px;
          display: block;
          margin-bottom: 16px;
          animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }

        .gate-hero h2 {
          font-family: 'Cormorant Garamond', serif;
          font-weight: 300; font-size: 36px;
          color: var(--brown); letter-spacing: .5px;
          position: relative; z-index: 2;
        }
        .gate-hero h2 em { font-style: italic; color: var(--rose); }

        .gate-hero p {
          font-size: 10px; letter-spacing: 4px;
          text-transform: uppercase;
          color: var(--taupe-dark);
          margin-top: 10px; font-weight: 400;
          position: relative; z-index: 2;
        }

        .gate-body { padding: 40px 36px 44px; position: relative; z-index: 1; }

        .gate-label {
          display: block; font-size: 10px; letter-spacing: 3px;
          text-transform: uppercase; color: var(--text-mid);
          margin-bottom: 12px; font-weight: 500;
        }

        .gate-input-wrap { position: relative; margin-bottom: 12px; }

        #gatePassword {
          width: 100%; padding: 14px 48px 14px 18px;
          background: #fff;
          border: 1px solid rgba(131,103,91,.12);
          border-bottom: 2px solid rgba(131,103,91,.15);
          border-radius: 8px;
          font-family: 'Jost', sans-serif;
          font-size: 15px; font-weight: 300;
          color: var(--text-dark);
          outline: none; letter-spacing: 1px;
          transition: all .3s var(--ease-smooth);
        }
        #gatePassword:focus {
          border-color: rgba(131,103,91,.25);
          border-bottom-color: var(--rose);
          box-shadow: 0 6px 24px rgba(204,131,138,.15);
          transform: translateY(-2px);
        }
        #gatePassword.error {
          border-bottom-color: #c0392b;
          animation: shake .35s var(--ease);
        }

        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-8px); }
          75% { transform: translateX(8px); }
        }

        .toggle-pw {
          position: absolute; right: 14px; top: 50%;
          transform: translateY(-50%);
          background: none; border: none; cursor: pointer;
          color: var(--text-muted); font-size: 16px;
          transition: color .25s var(--ease);
        }
        .toggle-pw:hover { color: var(--rose); }

        #gateError {
          display: none;
          font-size: 12px;
          color: #c0392b;
          margin-top: 8px;
          text-align: center;
          font-weight: 500;
          animation: slideDown .3s var(--ease) both;
        }

        @keyframes slideDown {
          from { opacity: 0; transform: translateY(-8px); }
          to { opacity: 1; transform: translateY(0); }
        }

        #gateError.visible { display: block; }

        #gateSubmit {
          width: 100%;
          padding: 14px 24px;
          background: linear-gradient(135deg, var(--rose) 0%, var(--rose-light) 100%);
          color: var(--cream-light);
          border: 2px solid var(--rose);
          border-radius: 8px;
          font-family: 'Jost', sans-serif;
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          cursor: pointer;
          transition: all .3s var(--ease-smooth);
          margin-top: 4px;
          box-shadow: 0 6px 20px rgba(131,103,91,.2);
        }

        #gateSubmit:hover {
          transform: translateY(-2px);
          box-shadow: 0 10px 32px rgba(131,103,91,.25), 0 0 20px rgba(204,131,138,.15);
        }

        #gateSubmit:active { transform: translateY(0); }

        /* ════════════════════════════════
           LAYOUT & TOPBAR
        ════════════════════════════════ */
        .layout {
          position: relative; z-index: 1;
          opacity: 0; pointer-events: none;
          transition: opacity .5s var(--ease) .2s, pointer-events .5s var(--ease) .2s;
        }

        .layout.unlocked {
          opacity: 1;
          pointer-events: auto;
        }

        header {
          background: #fff;
          border-bottom: 2px solid var(--border-rose);
          padding: 24px 32px;
          display: flex;
          align-items: center;
          gap: 20px;
          position: sticky;
          top: 0;
          z-index: 50;
          box-shadow: var(--shadow);
        }

        .topbar-icon {
          font-size: 32px;
          flex-shrink: 0;
        }

        .topbar-title {
          flex: 1;
        }

        .topbar-title h1 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 28px;
          font-weight: 300;
          color: var(--brown);
          letter-spacing: 1px;
          line-height: 1;
        }

        .topbar-title h1 em {
          display: block;
          font-style: italic;
          font-size: 18px;
          color: var(--rose);
          margin-top: 4px;
        }

        .topbar-divider {
          display: flex;
          align-items: center;
          gap: 8px;
          color: var(--text-muted);
          font-size: 12px;
        }

        .topbar-divider span { width: 24px; height: 1px; background: var(--border-rose); }
        .topbar-divider i { font-style: italic; letter-spacing: 1px; }

        .topbar-meta {
          font-size: 11px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: var(--text-muted);
          font-weight: 500;
        }

        /* ════════════════════════════════
           MAIN CONTENT
        ════════════════════════════════ */
        .main {
          max-width: 1200px;
          margin: 0 auto;
          padding: 48px 32px;
        }

        .section-label {
          font-size: 11px;
          letter-spacing: 3px;
          text-transform: uppercase;
          color: var(--text-mid);
          font-weight: 600;
          margin-bottom: 20px;
        }

        /* ════════════════════════════════
           STATS CARDS — PREMIUM
        ════════════════════════════════ */
        .stats {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
          gap: 24px;
          margin-bottom: 48px;
        }

        .stat-card {
          background: #fff;
          border: 1px solid var(--border-rose);
          border-radius: var(--radius);
          padding: 32px;
          text-align: center;
          position: relative;
          overflow: hidden;
          transition: all .3s var(--ease-smooth);
          box-shadow: var(--shadow);
        }

        .stat-card::before {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(135deg, transparent 0%, rgba(204,131,138,.08) 100%);
          opacity: 0;
          transition: opacity .3s var(--ease);
          pointer-events: none;
        }

        .stat-card:hover {
          transform: translateY(-6px);
          box-shadow: var(--shadow-lg);
          border-color: var(--rose);
        }

        .stat-card:hover::before { opacity: 1; }

        .stat-card.loading {
          opacity: .6;
        }

        .stat-label {
          font-size: 12px;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--text-mid);
          margin-bottom: 16px;
          font-weight: 500;
          position: relative; z-index: 1;
        }

        .stat-number {
          font-family: 'Cormorant Garamond', serif;
          font-size: 48px;
          font-weight: 300;
          color: var(--brown);
          line-height: 1;
          position: relative; z-index: 1;
        }

        #card-attending .stat-number { color: var(--rose); }
        #card-declined .stat-number { color: #c0392b; }

        /* ════════════════════════════════
           SEARCH & FILTERS
        ════════════════════════════════ */
        .search-wrap {
          position: relative;
          margin-bottom: 32px;
        }

        .search-icon {
          position: absolute;
          left: 16px;
          top: 50%;
          transform: translateY(-50%);
          font-size: 18px;
          opacity: .5;
        }

        #search {
          width: 100%;
          padding: 14px 16px 14px 48px;
          background: #fff;
          border: 1px solid var(--border-rose);
          border-radius: var(--radius);
          font-family: 'Jost', sans-serif;
          font-size: 14px;
          color: var(--text-dark);
          outline: none;
          transition: all .3s var(--ease-smooth);
          box-shadow: var(--shadow);
        }

        #search:focus {
          border-color: var(--rose);
          box-shadow: var(--shadow-lg), 0 0 0 3px rgba(201,168,76,.1);
          transform: translateY(-2px);
        }

        .list-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 24px;
          margin-bottom: 24px;
          flex-wrap: wrap;
        }

        .filter-pills {
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
        }

        .pill {
          padding: 8px 18px;
          background: #fff;
          border: 1px solid var(--border-rose);
          border-radius: 20px;
          font-size: 12px;
          font-weight: 500;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--text-mid);
          cursor: pointer;
          transition: all .3s var(--ease-smooth);
        }

        .pill:hover {
          border-color: var(--rose);
          color: var(--brown);
        }

        .pill.active {
          background: linear-gradient(135deg, var(--brown) 0%, var(--burg-light) 100%);
          border-color: var(--rose);
          color: var(--cream-light);
        }

        .btn-refresh {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 10px 20px;
          background: #fff;
          border: 1px solid var(--border-rose);
          border-radius: var(--radius);
          font-family: 'Jost', sans-serif;
          font-size: 12px;
          font-weight: 500;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--text-mid);
          cursor: pointer;
          transition: all .3s var(--ease-smooth);
          box-shadow: var(--shadow);
        }

        .btn-refresh:hover {
          border-color: var(--rose);
          color: var(--brown);
          transform: translateY(-2px);
        }

        .btn-refresh.spinning svg {
          animation: spin .6s linear infinite;
        }

        @keyframes spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        /* ════════════════════════════════
           GUEST LIST
        ════════════════════════════════ */
        #guestList {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
          gap: 20px;
          margin-bottom: 48px;
        }

        .guest {
          background: #fff;
          border: 1px solid var(--border-rose);
          border-radius: var(--radius);
          padding: 24px;
          transition: all .3s var(--ease-smooth);
          box-shadow: var(--shadow);
          animation: slideUp .4s var(--ease) both;
        }

        @keyframes slideUp {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .guest:hover {
          transform: translateY(-4px);
          border-color: var(--rose);
          box-shadow: var(--shadow-lg);
        }

        .guest-info {
          position: relative; z-index: 1;
        }

        .guest-name {
          font-family: 'Cormorant Garamond', serif;
          font-size: 20px;
          font-weight: 400;
          color: var(--brown);
          margin-bottom: 12px;
          line-height: 1.2;
        }

        .guest-meta {
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
          margin-bottom: 12px;
          align-items: center;
        }

        .badge {
          display: inline-block;
          padding: 6px 12px;
          border-radius: 16px;
          font-size: 11px;
          font-weight: 600;
          letter-spacing: 1px;
          text-transform: uppercase;
        }

        .badge--attending {
          background: rgba(201,168,76,.15);
          color: var(--rose);
          border: 1px solid rgba(201,168,76,.3);
        }

        .badge--declined {
          background: rgba(192,57,43,.1);
          color: #c0392b;
          border: 1px solid rgba(192,57,43,.2);
        }

        .guest-detail {
          font-size: 12px;
          color: var(--text-muted);
          font-weight: 400;
          letter-spacing: 0;
          text-transform: none;
          padding: 4px 8px;
          background: var(--gold-subtle);
          border-radius: 6px;
        }

        .guest-notes {
          font-size: 12px;
          color: var(--text-muted);
          margin-top: 12px;
          padding-top: 12px;
          border-top: 1px solid var(--gold-subtle);
          line-height: 1.5;
          font-style: italic;
        }

        /* ════════════════════════════════
           SKELETON LOADING
        ════════════════════════════════ */
        .skeleton-card {
          background: #fff;
          border: 1px solid var(--border-rose);
          border-radius: var(--radius);
          padding: 24px;
          animation: slideUp .4s var(--ease) both;
        }

        .skeleton {
          background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 8px;
        }

        .skeleton-name {
          height: 20px;
          margin-bottom: 12px;
          width: 60%;
        }

        .skeleton-tag {
          height: 24px;
          margin-bottom: 12px;
          width: 40%;
        }

        .skeleton-line {
          height: 12px;
        }

        @keyframes shimmer {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }

        /* ════════════════════════════════
           EMPTY STATE
        ════════════════════════════════ */
        .empty-state {
          text-align: center;
          padding: 60px 32px;
          color: var(--text-muted);
        }

        .empty-state.hidden { display: none; }

        .empty-icon {
          font-size: 64px;
          margin-bottom: 20px;
          display: block;
        }

        .empty-state p {
          font-size: 16px;
          color: var(--text-mid);
        }

        /* ════════════════════════════════
           RESPONSIVE
        ════════════════════════════════ */
        @media (max-width: 768px) {
          header {
            padding: 20px 24px;
            gap: 16px;
          }

          .topbar-title h1 { font-size: 24px; }
          .topbar-title h1 em { font-size: 16px; }

          .main { padding: 32px 24px; }

          .list-header {
            flex-direction: column;
            align-items: flex-start;
          }

          .filter-pills { width: 100%; }

          #guestList {
            grid-template-columns: 1fr;
          }

          .stats {
            grid-template-columns: 1fr;
          }
        }

        @media (max-width: 600px) {
          header {
            flex-direction: column;
            text-align: center;
            padding: 16px 20px;
          }

          .topbar-title { order: -1; }
          .topbar-divider { display: none; }
          .topbar-meta { display: none; }

          .main { padding: 24px 16px; }

          .section-label { margin-bottom: 16px; }

          .search-wrap { margin-bottom: 24px; }

          .guest {
            padding: 20px;
          }

          .guest-name { font-size: 18px; }

          .btn-refresh { width: 100%; justify-content: center; }
        }
    </style>
</head>

<body>

<!-- ════════════════════════════════════════
     PASSWORD GATE
════════════════════════════════════════ -->
<div id="gate">
    <div class="gate-card">
        <div class="gate-hero">
            <div class="gate-icon">🔐</div>
            <h2>Admin<em>Dashboard</em></h2>
            <p>Guest Management</p>
        </div>
        <div class="gate-body">
            <label class="gate-label">Enter Password</label>
            <div class="gate-input-wrap">
                <input type="password" id="gatePassword" placeholder="••••••••" />
                <button class="toggle-pw" id="togglePw" type="button">👁</button>
            </div>
            <div id="gateError">Incorrect password</div>
            <button id="gateSubmit" type="button">Unlock</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════
     DASHBOARD
════════════════════════════════════════ -->
<div class="layout">

    <!-- Header -->
    <header>
        <div class="topbar-icon">💒</div>
        <div class="topbar-title">
            <h1>Hassan & Nasreen<em>حسن و نسرين</em></h1>
        </div>
        <div class="topbar-divider">
            <span></span><i>May 12</i><span></span>
        </div>
        <span class="topbar-meta">Guest Management</span>
    </header>

    <!-- Main -->
    <main class="main">

        <!-- Stats -->
        <p class="section-label">Overview</p>
        <div class="stats">
            <div class="stat-card" id="card-total">
                <div class="stat-label">Total Guests</div>
                <div class="stat-number" id="totalGuests">—</div>
            </div>
            <div class="stat-card" id="card-attending">
                <div class="stat-label">Attending</div>
                <div class="stat-number" id="attendingCount">—</div>
            </div>
            <div class="stat-card" id="card-declined">
                <div class="stat-label">Declined</div>
                <div class="stat-number" id="declinedCount">—</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search by name, status, notes…" autocomplete="off" />
        </div>

        <!-- List header -->
        <div class="list-header">
            <p class="section-label" style="margin:0">Guest List</p>
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;width:100%">
                <div class="filter-pills">
                    <button class="pill active" data-filter="all">All</button>
                    <button class="pill" data-filter="Will Attend">Attending</button>
                    <button class="pill" data-filter="Cannot Attend">Declined</button>
                </div>
                <button class="btn-refresh" id="refreshBtn" title="Refresh" type="button">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- Guest list -->
        <div id="guestList" aria-live="polite"></div>
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🔎</div>
            <p>No guests match your search</p>
        </div>

    </main>
</div>

<script>
    /* ════════════════════════════════════════
       PASSWORD GATE
    ════════════════════════════════════════ */
    const ADMIN_PASSWORD = "roses2025"; // ← change this
    const SESSION_KEY    = "wedding_admin_auth";

    function unlock() {
      document.getElementById("gate").style.display = "none";
      document.querySelector(".layout").classList.add("unlocked");
      loadGuests();
    }

    if (sessionStorage.getItem(SESSION_KEY) === ADMIN_PASSWORD) { unlock(); }

    document.getElementById("gateSubmit").addEventListener("click", checkPassword);
    document.getElementById("gatePassword").addEventListener("keydown", function(e) { if(e.key==="Enter") checkPassword(); });

    function checkPassword() {
      const input = document.getElementById("gatePassword");
      const error = document.getElementById("gateError");
      if (input.value === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, ADMIN_PASSWORD);
        unlock();
      } else {
        input.classList.add("error");
        error.classList.add("visible");
        input.value = "";
        setTimeout(() => input.classList.remove("error"), 400);
      }
    }

    document.getElementById("togglePw").addEventListener("click", function() {
      const input = document.getElementById("gatePassword");
      input.type = input.type === "password" ? "text" : "password";
      this.textContent = input.type === "password" ? "👁" : "🙈";
    });

    /* ── API — UPDATED API_URL ── */
    const API_URL = "https://script.google.com/macros/s/AKfycby6W5ioMAzBBFb_UWVqYo7G6Guj8u-H6AjZPWLS4uIpdqyH0hrSCES8C3RE-dnY77PI/exec";

    let allGuests    = [];
    let activeFilter = "all";

    function showSkeletons(n = 5) {
      document.getElementById("guestList").innerHTML = Array.from({length:n}, () => `
        <div class="skeleton-card">
          <div class="skeleton skeleton-name"></div>
          <div class="skeleton skeleton-tag"></div>
          <div class="skeleton skeleton-line" style="width:38%"></div>
        </div>`).join("");
    }

    function renderGuests(guests) {
      const list  = document.getElementById("guestList");
      const empty = document.getElementById("emptyState");
      if (!guests.length) { list.innerHTML = ""; empty.style.display = "block"; return; }
      empty.style.display = "none";
      list.innerHTML = guests.map((g, i) => {
        const isAttending = g.attendance === "Will Attend";
        const badgeClass  = isAttending ? "badge--attending" : "badge--declined";
        const notes       = g.notes ? `<p class="guest-notes">${g.notes}</p>` : "";
        return `
          <div class="guest" style="animation-delay:${i*.045}s">
            <div class="guest-info">
              <div class="guest-name">${g.name || "—"}</div>
              <div class="guest-meta">
                <span class="badge ${badgeClass}">${g.attendance || "—"}</span>
                ${g.guests ? `<span class="guest-detail">👥 ${g.guests} guest${g.guests!=1?'s':''}</span>` : ""}
              </div>
              ${notes}
            </div>
          </div>`;
      }).join("");
    }

    function updateStats(guests) {
      const total     = guests.length;
      const attending = guests.filter(g => g.attendance === "Will Attend").length;
      animateNumber("totalGuests",    total);
      animateNumber("attendingCount", attending);
      animateNumber("declinedCount",  total - attending);
    }

    function animateNumber(id, target) {
      const el = document.getElementById(id);
      const start = parseInt(el.textContent) || 0;
      const diff  = target - start;
      const dur   = 500; let t0;
      function step(ts) {
        if (!t0) t0 = ts;
        const p = Math.min((ts-t0)/dur, 1);
        el.textContent = Math.round(start + diff * p);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function applyFilters() {
      const query = document.getElementById("search").value.toLowerCase().trim();
      let filtered = allGuests;
      if (activeFilter !== "all") filtered = filtered.filter(g => g.attendance === activeFilter);
      if (query) filtered = filtered.filter(g => [g.name,g.attendance,g.notes,g.guests].join(" ").toLowerCase().includes(query));
      renderGuests(filtered);
    }

    async function loadGuests() {
      const refreshBtn = document.getElementById("refreshBtn");
      refreshBtn.classList.add("spinning");
      showSkeletons();
      document.querySelectorAll(".stat-card").forEach(c => c.classList.add("loading"));
      try {
        const res  = await fetch(API_URL);
        const data = await res.json();
        allGuests  = data;
        updateStats(data);
        applyFilters();
      } catch(err) {
        document.getElementById("guestList").innerHTML =
          `<div class="empty-state" style="display:block"><div class="empty-icon">⚠️</div><p>Could not load guests. Try refreshing.</p></div>`;
      } finally {
        document.querySelectorAll(".stat-card").forEach(c => c.classList.remove("loading"));
        refreshBtn.classList.remove("spinning");
      }
    }

    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("refreshBtn").addEventListener("click", loadGuests);
    document.querySelectorAll(".pill").forEach(pill => {
      pill.addEventListener("click", function() {
        document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
        this.classList.add("active");
        activeFilter = this.dataset.filter;
        applyFilters();
      });
    });

    /* ── Init: loadGuests() is called by unlock() after password auth ── */
</script>

</body>
</html>
